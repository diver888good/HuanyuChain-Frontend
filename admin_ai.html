<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI智能对话</title>
    <link rel="stylesheet" href="style.css">
    <!-- ✅ 权限校验：仅后台页面使用，位置正确 -->
    <script>
    if(!localStorage.userInfo){
        alert("请先登录！");
        location.href="login.html";
    }
    let user = JSON.parse(localStorage.userInfo);
    if(user.user_role !== "admin"){
        alert("无后台管理权限！");
        location.href="user_center.html";
    }
    </script>
</head>
<body>
<div class="top-nav">
    <div class="logo">寰域链 V8.0 管理后台</div>
    <div class="user-info">
        <span id="userName">管理员</span>
        <span class="logout-btn" onclick="userLogout()">退出登录</span>
    </div>
</div>
<div class="side-bar">
    <!-- ✅ 全部修改为 admin_ 前缀链接 -->
    <a href="admin_dashboard.html">系统首页</a>
    <a href="admin_realname.html">实名身份备案</a>
    <a href="admin_cert.html">链上数据存证</a>
    <a href="admin_did.html">DID身份管理</a>
    <a href="admin_video.html">视频司法存证</a>
    <a href="admin_gov.html">政务台账上链</a>
    <a href="admin_meta.html">元宇宙&NFT</a>
    <a href="admin_privacy.html">隐私计算服务</a>
    <a href="admin_judicial.html">司法存证报告</a>
    <a href="admin_audit.html">系统审计日志</a>
    <a href="admin_cross.html">跨链互通服务</a>
    <a href="admin_contract.html">智能合约管理</a>
    <a href="admin_iot.html">IoT设备存证</a>
    <a href="admin_market.html">数字资产市场</a>
    <a href="admin_ai.html" class="active">AI智能对话</a>
</div>
<div class="main-content">
    <div class="card">
        <h2>寰域链内置AI问答</h2>
        <textarea id="chatMsg" placeholder="输入你想问的问题" rows="4"></textarea>
        <button class="btn" onclick="sendAiChat()">发送提问</button>
        <div style="margin-top:20px;padding:15px;background:#f8f9fa;border-radius:6px;">
            <p>AI回复：<span id="aiReply"></span></p>
        </div>
    </div>
</div>
<script src="app.js"></script>
<script>
fillUserInfo();

async function sendAiChat(){
    const msg = document.getElementById('chatMsg').value.trim();
    const replyDom = document.getElementById('aiReply');

    if(!msg) {
        replyDom.innerText = "请输入问题";
        return;
    }

    try {
        const res = await httpPost("/api/ai/chat", {
            content: msg
        });
        replyDom.innerText = res?.code === 200 ? res.data.reply : "AI服务异常";
    } catch (e) {
        replyDom.innerText = "⚠️ 服务器连接失败";
    }
}
</script>
</body>
</html>
