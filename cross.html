<div class="main-content">
    <div class="card">
        <h2>跨链数据同步存证</h2>

        <!-- ===================== 【新增】文件上传 + 哈希输入框 ===================== -->
        <div class="upload-box">
            <input type="file" id="crossFile" placeholder="上传跨链存证文件">
            <button class="hash-btn" onclick="createCrossHash()">生成存证哈希</button>
        </div>
        <input type="text" id="crossHash" class="hash-input" placeholder="跨链存证哈希值">

        <!-- 【原有按钮 100%保留】 -->
        <button class="btn" onclick="crossChainSave()">发起跨链存证</button>
    </div>
</div>

<script src="app.js"></script>
<script>
fillUserInfo();

// ===================== 【原有代码 完全不动】 =====================
async function crossChainSave(){
    // 自动携带生成的哈希值，兼容原有接口
    let data = {
        cross_hash: document.getElementById('crossHash').value || ""
    };
    let res = await httpPost('/api/cross/deposit', data);
    alert(res.msg);
}

// ===================== 【新增】跨链文件哈希生成 =====================
function createCrossHash() {
    const fileInput = document.getElementById('crossFile');
    const file = fileInput.files[0];
    if (!file) {
        alert("请先选择跨链存证文件！");
        return;
    }

    const reader = new FileReader();
    reader.onload = async function (e) {
        // 生成SHA256区块链标准哈希
        const buffer = e.target.result;
        const hashBuffer = await crypto.subtle.digest('SHA-256', new Uint8Array(buffer));
        const crossHash = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        
        // 自动填充哈希
        document.getElementById('crossHash').value = crossHash;
        alert("跨链哈希生成成功！已自动填充");
    };
    reader.readAsArrayBuffer(file);
}
</script>
