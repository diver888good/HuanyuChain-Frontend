<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <!-- ✅ 管理员权限校验（后台页面必备） -->
    <script>
    if(!localStorage.userInfo){
        alert("请先登录！");
        location.href="login.html";
    }
    let user = JSON.parse(localStorage.userInfo);
    if(user.user_role !== "admin"){
        alert("无后台管理权限！");
        location.href="user_center.html";
    }
    </script>
</head>
<body>
<div class="top-nav">
    <div class="logo">寰域链 V8.0 管理后台</div>
    <div class="user-info">
        <span id="userName">管理员</span>
        <span class="logout-btn" onclick="userLogout()">退出登录</span>
    </div>
</div>
<div class="side-bar">
    <!-- ✅ 全部修改为 admin_ 前缀链接 -->
    <a href="admin_dashboard.html">系统首页</a>
    <a href="admin_realname.html">实名身份备案</a>
    <a href="admin_cert.html">链上数据存证</a>
    <a href="admin_did.html">DID身份管理</a>
    <a href="admin_video.html">视频司法存证</a>
    <a href="admin_gov.html">政务台账上链</a>
    <a href="admin_meta.html">元宇宙&NFT</a>
    <a href="admin_privacy.html">隐私计算服务</a>
    <a href="admin_judicial.html">司法存证报告</a>
    <a href="admin_audit.html">系统审计日志</a>
    <a href="admin_cross.html">跨链互通服务</a>
    <a href="admin_contract.html">智能合约管理</a>

    <a href="admin_market.html" class="active">数字资产市场</a>
    <a href="admin_ai.html">AI智能对话</a>
</div>
<div class="main-content">
    <div class="card">
        <h2>查看市场资产列表</h2>
        <button class="btn" onclick="getAssetList()">获取资产列表</button>
    </div>
    <div class="card">
        <h2>购买链上数字资产</h2>
        <button class="btn" onclick="buyChainAsset()">发起资产交易</button>
    </div>
</div>

<script src="app.js"></script>
<script>
fillUserInfo();

// 原有代码100%保留，无任何修改
async function getAssetList(){
    try {
        let res = await httpPost('/api/market/asset/list', {});
        if(res.code === 200){
            let ids = res.data.assets.map(item => item.list_id);
            alert("资产列表ID：" + ids.join("、"));
        } else {
            alert("获取列表失败");
        }
    } catch (error) {
        alert("服务器连接失败");
        console.log(error);
    }
}

async function buyChainAsset(){
    try {
        let res = await httpPost('/api/market/asset/buy', { list_id: 1001 });
        if(res.code === 200){
            alert("订单编号："+res.data.order_id+"\n交易状态：购买成功");
        }
    } catch (error) {
        alert("交易失败，请重试");
        console.log(error);
    }
}
</script>
</body>
</html>
