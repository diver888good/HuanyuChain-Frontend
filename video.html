<div class="main-content">
    <div class="card">
        <h2>视频双哈希司法存证（需实名+绑定DID）</h2>
        <input type="text" id="videoDid" placeholder="用户绑定DID">
        <input type="text" id="fastHash" placeholder="快速帧哈希">
        <input type="text" id="fullHash" placeholder="司法级完整文件哈希">
        <button class="btn" onclick="videoChainCert()">提交存证</button>
    </div>
</div>
<script src="app.js"></script>
<script>
fillUserInfo();
async function videoChainCert(){
    let data = {
        did: document.getElementById('videoDid').value,
        video_hash: document.getElementById('fastHash').value,
        full_file_hash: document.getElementById('fullHash').value
    }
    let res = await httpPost('/api/video/cert',data);
    alert(res.msg);
}
</script>
