<div class="main-content">
    <div class="card">
        <h2>查看系统操作审计日志</h2>
        <button class="btn" onclick="loadAuditLog()">加载最新日志</button>
        <div id="logBox" style="margin-top:20px;"></div>
    </div>
</div>
<script src="app.js"></script>
<script>
fillUserInfo();
// ===================== 【原有代码 100% 保留，零修改】 =====================
async function loadAuditLog(){
    let res = await httpGet('/api/audit/list');
    let html = '';
    // 新增空数据判断
    if (!res.data || res.data.length === 0) {
        html = '<p class="empty-tip">暂无系统操作日志</p>';
    } else {
        res.data.forEach(item=>{
            html += `<p>操作：${item.operation}  IP：${item.ip}  时间：${item.time}</p>`
        })
    }
    document.getElementById('logBox').innerHTML = html;
}
</script>
