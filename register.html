<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链注册</h1>
            <a href="index.html">返回登录</a>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>新用户注册</h3></div>
            <div class="card-body">
                <input type="text" id="regUser" placeholder="设置用户名">
                <input type="password" id="regPwd" placeholder="设置密码">
                <button class="btn-primary" onclick="doRegister()">提交注册</button>
            </div>
        </div>
    </main>
<script src="app.js"></script>
<script>
async function doRegister(){
    let u = regUser.value.trim();
    let p = regPwd.value.trim();
    if(!u || !p) return alert("请填写完整信息");
    
    try {
        let res = await httpPost("/api/auth/register", { username:u, password:p });
        alert(res.msg || "注册成功");
        if(res.code === 200) location.href = "index.html";
    } catch(e) {
        alert("注册请求异常");
    }
}
</script>
</body>
</html>
