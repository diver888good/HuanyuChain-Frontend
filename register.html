<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>寰域链 - 注册</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: Arial;}
        body {background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh;}
        .box {width: 360px; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 2px 10px #00000010;}
        h2 {text-align: center; margin-bottom: 25px; color: #333;}
        input {width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #eee; border-radius: 6px; font-size: 14px;}
        button {width: 100%; padding: 12px; background: #2d8cf0; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; margin-top: 10px;}
        .tips {text-align: center; margin-top: 15px; font-size: 13px;}
        a {color: #2d8cf0; text-decoration: none;}
    </style>
</head>
<body>
    <div class="box">
        <h2>用户注册</h2>
        <input type="text" id="username" placeholder="请输入用户名">
        <input type="password" id="password" placeholder="请输入密码">
        <button id="registerBtn">立即注册</button>
        <div class="tips">已有账号？<a href="index.html">返回登录</a></div>
    </div>

<script>
// 直接绑定事件，无任何依赖，按钮必响应
document.getElementById('registerBtn').onclick = async function() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    // 非空校验
    if(!username || !password){
        alert('请填写完整信息！');
        return;
    }

    try {
        // 直接请求后端注册接口（精准匹配）
        const res = await fetch("https://huanyuchain.pythonanywhere.com/api/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });
        const result = await res.json();

        if(result.code === 200){
            alert('注册成功！请登录');
            location.href = 'index.html';
        }else{
            alert(result.msg);
        }
    } catch (error) {
        alert('网络异常，请刷新重试');
        console.log(error);
    }
}
</script>
</body>
</html>
