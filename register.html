<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>寰域链 - 用户注册</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
        body {background:#f5f5f5;display:grid;place-items:center;height:100vh;}
        .login-box {width:350px;background:white;padding:30px;border-radius:10px;box-shadow:0 0 10px #0000001a;}
        h2 {text-align:center;margin-bottom:20px;color:#2c3e50;}
        input {width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:5px;}
        button {width:100%;padding:12px;background:#2d8cf0;color:white;border:none;border-radius:5px;cursor:pointer;margin-top:10px;}
        .link {text-align:center;margin-top:15px;}
        .link a {color:#2d8cf0;text-decoration:none;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>用户注册</h2>
        <input type="text" id="username" placeholder="用户名" required>
        <input type="password" id="password" placeholder="密码" required>
        <button id="registerBtn">注册</button>
        <div class="link">已有账号？<a href="index.html">去登录</a></div>
    </div>

    <!-- 引入公共JS -->
    <script src="common.js"></script>
    <script>
        // 注册逻辑
        document.getElementById("registerBtn").addEventListener("click", async () => {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            
            if (!username || !password) {
                alert("请输入用户名和密码");
                return;
            }

            // 调用后端注册接口
            const res = await httpPost("/api/auth/register", { username, password });
            
            if (res.code === 200) {
                alert("注册成功！请登录");
                location.href = "index.html";
            } else {
                alert(res.msg);
            }
        });
    </script>
</body>
</html>
