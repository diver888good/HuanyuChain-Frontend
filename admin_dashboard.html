<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统控制台</title>
    <link rel="stylesheet" href="style.css">
    <!-- ✅ 管理员权限校验（后台首页必备） -->
    <script>
    if(!localStorage.userInfo){
        alert("请先登录！");
        location.href="login.html";
    }
    let user = JSON.parse(localStorage.userInfo);
    if(user.user_role !== "admin"){
        alert("无后台管理权限！");
        location.href="user_center.html";
    }
    </script>
    <style>
        .flex-row{display:flex;gap:20px;margin-top:10px;}
        .stat-item{padding:15px;background:#f8f9fa;border-radius:6px;min-width:150px;}
    </style>
</head>
<body>
<!-- 顶部导航 -->
<div class="top-nav">
    <div class="logo">寰域链 V8.0 管理后台</div>
    <div class="user-info">
        <span id="userName">管理员</span>
        <span class="logout-btn" onclick="userLogout()">退出登录</span>
    </div>
</div>
<!-- 侧边栏 -->
<div class="side-bar">
    <!-- ✅ 全部修改为 admin_ 前缀链接 -->
    <a href="admin_dashboard.html" class="active">系统首页</a>
    <a href="admin_realname.html">实名身份备案</a>
    <a href="admin_cert.html">链上数据存证</a>
    <a href="admin_did.html">DID身份管理</a>
    <a href="admin_video.html">视频司法存证</a>
    <a href="admin_gov.html">政务台账上链</a>
    <a href="admin_meta.html">元宇宙&NFT</a>
    <a href="admin_privacy.html">隐私计算服务</a>
    <a href="admin_judicial.html">司法存证报告</a>
    <a href="admin_audit.html">系统审计日志</a>
    <a href="admin_cross.html">跨链互通服务</a>
    <a href="admin_contract.html">智能合约管理</a>
    <a href="admin_iot.html">IoT设备存证</a>
    <a href="admin_market.html">数字资产市场</a>
    <a href="admin_ai.html">AI智能对话</a>
</div>
<!-- 主内容 -->
<div class="main-content">
    <!-- 新增：个人身份信息卡片（核心优化） -->
    <div class="card">
        <h2>我的链上身份</h2>
        <p>
            专属DID：<span id="showUserDID" style="color:#165DFF; font-weight:bold;"></span>
            <button class="btn" style="margin-left:10px;" onclick="copyText()">一键复制</button>
        </p>
        <p id="realStatus" style="margin-top:8px;">实名状态：未备案</p>
    </div>

    <div class="card">
        <h2>系统运行数据统计</h2>
        <div class="flex-row" id="statBox">
            <div class="stat-item">链高度：<span id="chainH">0</span></div>
            <div class="stat-item">总存证数：<span id="certNum">0</span></div>
            <div class="stat-item">注册用户数：<span id="userNum">0</span></div>
        </div>
    </div>
    <div class="card">
        <h3>系统状态</h3>
        <p>✅ 后端服务正常运行</p>
        <p>✅ 数据库连接正常</p>
        <p>✅ 国密算法套件已启用</p>
        <p>✅ 全模块功能已部署完成</p>
    </div>
</div>
<script src="app.js"></script>
<script>
// 存储用户DID，用于复制
let userDIDValue = "";

window.onload = async function(){
    fillUserInfo();
    
    // 1. 获取并显示用户DID（修复异步+未定义报错）
    await loadUserDID();
    // 2. 加载系统统计数据（修复404）
    await loadSystemStats();
    // 3. 更新实名状态
    document.getElementById("realStatus").innerText = "实名状态：已备案";
}

// 🔥 补全：获取用户DID（核心修复函数）
async function loadUserDID() {
    try {
        let res = await httpGet('/api/did/get');
        if(res.code === 200){
            userDIDValue = res.data.did;
            document.getElementById("showUserDID").innerText = userDIDValue;
        }
    } catch (error) {
        document.getElementById("showUserDID").innerText = "未生成DID";
    }
}

// 🔥 补全：复制DID函数（修复未定义报错）
function copyText() {
    if(!userDIDValue){
        alert("暂无DID可复制");
        return;
    }
    navigator.clipboard.writeText(userDIDValue).then(()=>{
        alert("DID复制成功！");
    })
}

// 🔥 补全：加载系统统计数据
async function loadSystemStats() {
    try {
        let res = await httpGet("/api/monitor/stats");
        if(res.code===200){
            document.getElementById("chainH").innerText=res.data.chain_height;
            document.getElementById("certNum").innerText=res.data.total_cert;
            document.getElementById("userNum").innerText=res.data.total_user;
        }
    } catch (error) {
        console.log("统计数据加载失败");
    }
}
</script>
</body>
</html>
