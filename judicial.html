<div class="main-content">

        <h2>根据哈希获取司法存证报告</h2>
        <input type="text" id="reportHash" placeholder="填写存证哈希值">
        <button class="btn" onclick="getJudicialReport()">获取报告链接</button>
        <p id="reportUrl"></p>
    </div>
</div>
<script src="app.js"></script>
<script>
fillUserInfo();
async function getJudicialReport(){
    let hash = document.getElementById('reportHash').value;
    let res = await httpGet(`/api/judicial/report/${hash}`);
    document.getElementById('reportUrl').innerText = "报告地址："+res.data.report_url;
}
</script>
