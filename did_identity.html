<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DID身份 - 寰域链 V8.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="dashboard.html">管理面板</a>
                <a href="did_identity.html" class="active">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button id="logoutBtn" class="btn-secondary">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>去中心化DID身份（永久固定）</h3></div>
            <div class="card-body">
                <button class="btn-primary" onclick="createDID()" id="createBtn">生成DID身份（仅生成一次）</button>
                <div id="didResult" class="result"></div>
                <p style="color:#666;margin-top:10px;">⚠️ 仅允许生成一次，生成后DID永久固定，不可修改！</p>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await verifyToken();
            // 加载时检查：如果已有DID，直接显示，禁用按钮
            const localDID = localStorage.getItem("MY_ONLY_DID");
            if (localDID) {
                document.getElementById("didResult").className = "result alert-success";
                document.getElementById("didResult").innerText = "✅ 你的固定DID：\n" + localDID;
                document.getElementById("createBtn").disabled = true;
                document.getElementById("createBtn").innerText = "DID已固定（不可重复生成）";
            }
        });

        async function createDID() {
            const btn = document.getElementById("createBtn");
            const dom = document.getElementById("didResult");

            btn.disabled = true;
            btn.innerText = "生成中...";
            dom.innerText = "";

            try {
                const data = await httpPost("/api/did/generate", { user_id: 1 });
                if (data.code === 200) {
                    const did = data.data.did;
                    // ✅ 永久保存DID，禁止再次生成
                    localStorage.setItem("MY_ONLY_DID", did);
                    
                    dom.className = "result alert-success";
                    dom.innerText = `✅ DID已永久固定：\n${did}\n\n⚠️ 请勿再次生成！`;
                    // 生成后永久禁用按钮
                    btn.disabled = true;
                    btn.innerText = "DID已固定（不可修改）";
                } else {
                    dom.className = "result alert-danger";
                    dom.innerText = data.msg || "生成失败";
                    btn.disabled = false;
                }
            } catch (error) {
                dom.className = "result alert-danger";
                dom.innerText = "网络异常";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
