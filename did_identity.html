<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DID身份 - 寰域链 V8.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="dashboard.html">管理面板</a>
                <a href="did_identity.html" class="active">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button id="logoutBtn" class="btn-secondary">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>DID身份（生成后永久固定）</h3></div>
            <div class="card-body">
                <!-- 生成后自动灰化，永远点不动 -->
                <button class="btn-primary" onclick="createDID()" id="createBtn">生成DID身份</button>
                <div id="didResult" class="result"></div>
                <p style="color:#999;margin-top:12px;font-size:12px;">⚠️ 仅可生成1次，生成后按钮锁定，DID永久不变</p>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await verifyToken();
            
            // 页面加载：如果已有DID，直接锁定按钮
            const saved_did = localStorage.getItem("MY_FIXED_DID");
            if(saved_did){
                document.getElementById("didResult").innerText = "✅ 已固定DID：\n" + saved_did;
                document.getElementById("didResult").className = "result alert-success";
                
                // 永久禁用按钮 + 变灰
                let btn = document.getElementById("createBtn");
                btn.disabled = true;
                btn.style.opacity = "0.5";
                btn.style.cursor = "not-allowed";
                btn.innerText = "DID已锁定（不可修改）";
            }
        });

        // 生成DID（仅1次机会）
        async function createDID() {
            let btn = document.getElementById("createBtn");
            let result_box = document.getElementById("didResult");

            // 生成前直接锁定，防止重复点击
            btn.disabled = true;
            btn.style.opacity = "0.5";
            btn.style.cursor = "not-allowed";
            btn.innerText = "生成中...";

            try {
                const res = await httpPost("/api/did/generate", { user_id: 1 });
                if(res.code === 200){
                    const did = res.data.did;
                    // 永久保存DID
                    localStorage.setItem("MY_FIXED_DID", did);

                    result_box.className = "result alert-success";
                    result_box.innerText = "✅ DID已永久锁定：\n" + did + "\n\n⚠️ 私钥无需保存，不影响任何存证！";
                }else{
                    result_box.className = "result alert-danger";
                    result_box.innerText = "生成失败";
                    // 失败解锁按钮
                    btn.disabled = false;
                    btn.style.opacity = "1";
                    btn.style.cursor = "pointer";
                    btn.innerText = "生成DID身份";
                }
            } catch (error) {
                result_box.className = "result alert-danger";
                result_box.innerText = "网络异常，请重试";
                // 失败解锁按钮
                btn.disabled = false;
                btn.style.opacity = "1";
                btn.style.cursor = "pointer";
                btn.innerText = "生成DID身份";
            }
        }
    </script>
</body>
</html>
