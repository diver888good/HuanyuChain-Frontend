<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DID身份 - 寰域链 V8.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="personal_center.html">个人中心</a>
                <a href="dashboard.html">管理面板</a>
                <a href="did_identity.html" class="active">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button id="logoutBtn" class="btn-secondary" onclick="logout()">退出</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <div class="card-header"><h3>我的DID身份</h3></div>
            <div class="card-body">
                <div id="didResult" style="word-break: break-all; margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 6px;">
                    暂无DID身份，请点击生成
                </div>
                <button class="btn-primary" onclick="generateDID()" style="margin-top: 10px;">生成本地DID身份</button>
            </div>
        </div>
    </main>

    <!-- 纯本地代码，无外部依赖，零报错 -->
    <script>
        // 页面加载完成
        window.onload = () => {
            // 本地登录校验
            const token = localStorage.getItem("token");
            if (!token) {
                alert("请先登录！");
                location.href = "index.html";
                return;
            }

            // ✅ 本地实现用户信息显示（替代showUserInfo函数，彻底解决报错）
            const userInfo = JSON.parse(localStorage.getItem("userInfo") || '{}');
            document.getElementById("username").innerText = userInfo.username || "本地用户";
            document.getElementById("userInfo").style.display = "block";

            // 加载本地DID
            loadLocalDID();
        };

        // 加载本地存储的DID
        function loadLocalDID() {
            const didData = localStorage.getItem("MY_DID_INFO");
            if (didData) {
                document.getElementById("didResult").innerText = didData;
            }
        }

        // 纯本地生成DID（无网络请求）
        function generateDID() {
            const user = JSON.parse(localStorage.getItem("userInfo") || '{}');
            const did = `DID_LOCAL_${user.username}_${Date.now()}_${Math.random().toString(16).slice(2)}`;
            
            localStorage.setItem("MY_DID_INFO", did);
            document.getElementById("didResult").innerText = did;
            alert("✅ 本地DID身份生成成功！");
        }

        // 退出登录
        function logout() {
            localStorage.clear();
            location.href = "index.html";
        }
    </script>
</body>
</html>
