<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DID身份 - 寰域链 V8.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="personal_center.html">个人中心</a>
                <a href="dashboard.html">管理面板</a>
                <a href="did_identity.html" class="active">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button class="btn-secondary" onclick="logout()">退出</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <div class="card-header"><h3>我的DID身份</h3></div>
            <div class="card-body">
                <div id="didResult" style="padding: 12px; background: #f8f9fa; border-radius: 8px; word-break: break-all; margin: 10px 0;">
                    暂无DID身份
                </div>
                <button class="btn-primary" onclick="createDID()">生成DID身份</button>
            </div>
        </div>
    </main>

    <script>
        // 页面加载（无任何外部函数，零报错）
        window.onload = function() {
            // 本地登录校验
            const token = localStorage.getItem('token');
            if (!token) {
                alert('请先登录');
                location.href = 'index.html';
                return;
            }

            // 直接渲染用户名（替代 showUserInfo，彻底解决报错）
            const user = JSON.parse(localStorage.getItem('userInfo') || '{}');
            document.getElementById('username').innerText = user.username || '用户';
            document.getElementById('userInfo').style.display = 'block';

            // 加载已保存的DID
            const did = localStorage.getItem('MY_DID_INFO');
            if (did) {
                document.getElementById('didResult').innerText = did;
            }
        };

        // 生成本地DID
        function createDID() {
            const user = JSON.parse(localStorage.getItem('userInfo') || '{}');
            const did = `DID:${user.username}:${Date.now()}`;
            localStorage.setItem('MY_DID_INFO', did);
            document.getElementById('didResult').innerText = did;
            alert('DID生成成功！');
        }

        // 退出登录
        function logout() {
            localStorage.clear();
            location.href = 'index.html';
        }
    </script>
</body>
</html>
