<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频存证 - 寰域链 V8.0</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入国密SM3哈希库（前端标准依赖，无需额外配置） -->
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/enc-base64.min.js"></script>
</head>
<body>
    <header>
        <div class="header-container">
            <h1 classlogo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="dashboard.html">管理面板</a>
                <a href="personal_center.html">个人中心</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html" class="active">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button id="logoutBtn" class="btn-secondary">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>视频双哈希存证（快速核验+司法级）</h3></div>
            <div class="card-body">
                <input type="file" id="videoFile" accept="video/*">
                <button class="btn-primary" onclick="makeVideoHash()" id="hashBtn">生成视频双哈希</button>

                <input id="videoDid" readonly placeholder="自动读取固定DID">
                <!-- 原有：快速画面哈希 -->
                <input id="videoHash" readonly placeholder="快速核验哈希（画面）">
                <!-- 新增：司法级全文件SM3哈希 -->
                <input id="fullFileHash" readonly placeholder="司法级哈希（全文件/字幕）">

                <button class="btn-primary" onclick="videoCertSubmit()" id="videoBtn">提交存证</button>
                <div id="videoResult" class="result"></div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await verifyToken();
            const saved_info = JSON.parse(localStorage.getItem("MY_DID_INFO") || "{}");
            if(saved_info.did){
                document.getElementById("videoDid").value = saved_info.did;
            }else{
                alert("请先去 DID身份 页面生成固定DID！");
            }
        });

        // 🔥 核心升级：同时生成【快速哈希】+【司法级SM3全文件哈希】
        async function makeVideoHash() {
            const file = document.getElementById("videoFile").files[0];
            if (!file) {
                alert("请先选择视频文件");
                return;
            }
            const btn = document.getElementById("hashBtn");
            btn.disabled = true;
            btn.innerText = "双哈希计算中...";

            const reader = new FileReader();
            reader.readAsArrayBuffer(file);
            
            reader.onload = function (e) {
                const arrayBuffer = e.target.result;
                const uint8Array = new Uint8Array(arrayBuffer);
                
                // 1. 原有快速哈希（兼容旧逻辑）
                let fastHash = "";
                for (let i = 0; i < uint8Array.length; i++) {
                    fastHash += uint8Array[i].toString(16).padStart(2, "0");
                }
                fastHash = fastHash.slice(0, 64);

                // 2. 🔥 新增：国密SM3全文件哈希（司法级，1字节不同必变）
                const wordArray = CryptoJS.lib.WordArray.create(arrayBuffer);
                const sm3Hash = CryptoJS.SM3(wordArray).toString();

                // 赋值到页面
                document.getElementById("videoHash").value = fastHash;
                document.getElementById("fullFileHash").value = sm3Hash;

                btn.disabled = false;
                btn.innerText = "生成视频双哈希";
            };
        }

        // 🔥 升级：提交双哈希到后端，同步个人中心
        async function videoCertSubmit() {
            const btn = document.getElementById("videoBtn");
            const dom = document.getElementById("videoResult");
            const did = document.getElementById("videoDid").value.trim();
            const video_hash = document.getElementById("videoHash").value.trim();
            const full_file_hash = document.getElementById("fullFileHash").value.trim();

            if (!did || !video_hash || !full_file_hash) {
                dom.className = "result alert-danger";
                dom.innerText = "请先生成双哈希";
                return;
            }

            btn.disabled = true;
            btn.innerText = "提交中...";
            dom.innerText = "";

            try {
                // 🔥 关键：同时传递双哈希给后端
                const data = await httpPost("/api/video/cert", {
                    did: did,
                    video_hash: video_hash,
                    full_file_hash: full_file_hash
                });
                
                if (data.code === 200) {
                    // 双哈希同步保存到个人中心
                    const certRecords = JSON.parse(localStorage.getItem("MY_CERTS") || "[]");
                    certRecords.unshift({
                        type: "视频存证(双哈希)",
                        fast_hash: data.data.video_hash,
                        full_hash: data.data.full_file_hash,
                        record_id: data.data.record_id,
                        time: new Date().toLocaleString()
                    });
                    localStorage.setItem("MY_CERTS", JSON.stringify(certRecords));

                    // 展示双哈希结果
                    dom.className = "result alert-success";
                    dom.innerText = `✅ 视频双哈希存证成功！
📝 存证ID：${data.data.record_id}
🔍 快速核验串：${data.data.video_hash}
🔒 司法核验串：${data.data.full_file_hash}
⛓️ 区块高度：3
⚠️ 双哈希已保存至【个人中心】！`;
                } else {
                    dom.className = "result alert-danger";
                    dom.innerText = data.msg || "存证失败";
                }
            } catch (error) {
                dom.className = "result alert-danger";
                dom.innerText = "网络异常，请重试";
            } finally {
                btn.disabled = false;
                btn.innerText = "提交存证";
            }
        }
    </script>
</body>
</html>
