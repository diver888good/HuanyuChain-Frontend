<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频存证</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <nav>
                <a href="index.html">首页</a>
                <a href="video_cert.html" class="active">视频存证</a>
            </nav>
            <div id="userInfo" style="display:none">
                <span id="username"></span>
                <button onclick="logout()">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>视频文件哈希存证</h3></div>
            <div class="card-body">
                <input type="file" id="vidFile" accept="video/*">
                <button onclick="calcVidHash()">计算视频哈希</button>
                <input type="text" id="vidHashVal" readonly placeholder="视频哈希值">
                <button onclick="submitVidCert()">提交视频存证</button>
                <div id="vidRes"></div>
            </div>
        </div>
    </main>
<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded',async ()=>{
    if(!await verifyToken()){location.href="index.html";return;}
    showUserInfo();
})

function calcVidHash(){
    let f = vidFile.files[0];
    if(!f)return alert("请选择视频");
    let r = new FileReader();
    r.readAsArrayBuffer(f);
    r.onload=e=>{
        let w = CryptoJS.lib.WordArray.create(e.target.result);
        vidHashVal.value = CryptoJS.SHA256(w).toString();
    }
}

async function submitVidCert(){
    let h = vidHashVal.value.trim();
    if(!h)return alert("请计算哈希");
    let res = await httpPost("/api/cert/video",{video_hash:h});
    vidRes.innerText = res.msg;
}

function showUserInfo(){
    let u=JSON.parse(localStorage.getItem("userInfo")||"{}");
    username.innerText=u.username;userInfo.style.display="block";
}
</script>
</body>
</html>
