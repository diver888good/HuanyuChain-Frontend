<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频存证 - 寰域链 V8.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="personal_center.html">个人中心</a>
                <a href="dashboard.html">管理面板</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html" class="active">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button class="btn-secondary" onclick="logout()">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>视频哈希存证</h3></div>
            <div class="card-body">
                <input type="file" id="videoFile" accept="video/*">
                <button class="btn-primary" onclick="getVideoHash()">生成视频哈希</button>
                <input type="text" id="videoHash" readonly style="width:100%; margin:10px 0; padding:8px;">
                <button class="btn-primary" onclick="submitVideoCert()">提交存证</button>
                <div id="certResult" style="margin-top:10px;"></div>
            </div>
        </div>
    </main>
    <script>
        window.onload = () => {
            const token = localStorage.getItem("token");
            if (!token) { alert("请先登录！"); location.href = "index.html"; return; }
            const user = JSON.parse(localStorage.getItem("userInfo")||'{}');
            document.getElementById("username").innerText = user.username||"用户";
            document.getElementById("userInfo").style.display = "block";
        };
        function getVideoHash(){
            const file = document.getElementById("videoFile").files[0];
            if(!file){alert("请选择视频");return;}
            const reader = new FileReader();
            reader.readAsArrayBuffer(file);
            reader.onload = e=>{
                const hash = CryptoJS.SHA256(CryptoJS.lib.WordArray.create(e.target.result)).toString();
                document.getElementById("videoHash").value = hash;
                alert("哈希生成成功");
            }
        }
        function submitVideoCert(){
            const h = document.getElementById("videoHash").value;
            if(!h){alert("先生成哈希");return;}
            const r = "VIDEO-"+Date.now();
            localStorage.setItem("MY_CERTS",JSON.stringify([{type:"视频存证",hash:r,time:new Date().toLocaleString()},...JSON.parse(localStorage.getItem("MY_CERTS")||"[]")]));
            document.getElementById("certResult").innerHTML=`✅ 存证成功！ID：${r}`;
        }
        function logout(){localStorage.clear();location.href="index.html";}
    </script>
</body>
</html>
