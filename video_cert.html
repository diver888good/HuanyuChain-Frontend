<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频存证 - 寰域链 V8.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="dashboard.html">管理面板</a>
                <!-- 🔥 新增：个人中心入口 -->
                <a href="personal_center.html">个人中心</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html" class="active">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button id="logoutBtn" class="btn-secondary">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>视频存证（已上链·可查询）</h3></div>
            <div class="card-body">
                <input type="file" id="videoFile" accept="video/*">
                <button class="btn-primary" onclick="makeVideoHash()" id="hashBtn">生成视频哈希</button>

                <input id="videoDid" readonly placeholder="自动读取固定DID">
                <input id="videoHash" readonly placeholder="自动生成视频哈希">

                <button class="btn-primary" onclick="videoCertSubmit()" id="videoBtn">提交存证</button>
                <div id="videoResult" class="result"></div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await verifyToken();
            // 🔥 修复：读取新的DID存储格式（包含密钥，支持未来扩展）
            const saved_info = JSON.parse(localStorage.getItem("MY_DID_INFO") || "{}");
            if(saved_info.did){
                document.getElementById("videoDid").value = saved_info.did;
            }else{
                alert("请先去 DID身份 页面生成固定DID！");
            }
        });

        // 生成视频哈希（原样保留，无修改）
        function makeVideoHash() {
            const file = document.getElementById("videoFile").files[0];
            if (!file) {
                alert("请先选择视频文件");
                return;
            }
            const btn = document.getElementById("hashBtn");
            btn.disabled = true;
            btn.innerText = "计算中...";

            const reader = new FileReader();
            reader.readAsArrayBuffer(file);
            reader.onload = function (e) {
                const arr = new Uint8Array(e.target.result);
                let hash = "";
                for (let i = 0; i < arr.length; i++) {
                    hash += arr[i].toString(16).padStart(2, "0");
                }
                document.getElementById("videoHash").value = hash.slice(0, 64);
                btn.disabled = false;
                btn.innerText = "生成视频哈希";
            };
        }

        // 提交存证 + 自动保存记录到个人中心
        async function videoCertSubmit() {
            const btn = document.getElementById("videoBtn");
            const dom = document.getElementById("videoResult");
            const did = document.getElementById("videoDid").value.trim();
            const hash = document.getElementById("videoHash").value.trim();

            if (!did || !hash) {
                dom.className = "result alert-danger";
                dom.innerText = "请先生成DID和视频哈希";
                return;
            }

            btn.disabled = true;
            btn.innerText = "提交中...";
            dom.innerText = "";

            try {
                const data = await httpPost("/api/video/cert", {
                    did: did,
                    video_hash: hash
                });
                
                if (data.code === 200) {
                    // 🔥 核心：存证记录同步到个人中心
                    const certRecords = JSON.parse(localStorage.getItem("MY_CERTS") || "[]");
                    certRecords.unshift({
                        type: "视频存证",
                        hash: data.data.video_hash,
                        record_id: data.data.record_id,
                        time: new Date().toLocaleString()
                    });
                    localStorage.setItem("MY_CERTS", JSON.stringify(certRecords));

                    // 显示结果（原样保留）
                    dom.className = "result alert-success";
                    dom.innerText = `✅ 视频存证成功（已上链）
📝 存证ID：${data.data.record_id}
🔍 查询数字串：${data.data.video_hash}
⛓️ 区块高度：3
⚠️ 记录已保存至【个人中心】，可随时复制查询！`;
                } else {
                    dom.className = "result alert-danger";
                    dom.innerText = data.msg || "存证失败";
                }
            } catch (error) {
                dom.className = "result alert-danger";
                dom.innerText = "网络异常，请重试";
            } finally {
                btn.disabled = false;
                btn.innerText = "提交存证";
            }
        }
    </script>
</body>
</html>
