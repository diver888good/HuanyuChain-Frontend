<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频存证</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="dashboard.html">管理面板</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html" class="active">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;"><span id="username"></span><button id="logoutBtn" class="btn-secondary">退出</button></div>
        </div>
    </header>
    <main class="container">
        <div class="card"><div class="card-header"><h3>视频存证</h3></div><div class="card-body"><input id="videoDid" placeholder="DID"><input id="videoHash" placeholder="视频哈希"><button class="btn-primary" onclick="videoCertSubmit()">提交</button><div id="videoResult" class="result"></div></div></div>
    </main>
    <script src="app.js"></script>
    <script>
        window.onload = async ()=>{await verifyToken();}
        async function videoCertSubmit(){
            const did = document.getElementById("videoDid").value;
            const hash = document.getElementById("videoHash").value;
            const data = await httpPost("/api/video/cert",{did,video_hash:hash});
            const dom = document.getElementById("videoResult");
            data.code===200 ? (dom.className="result alert-success",dom.innerText=JSON.stringify(data.data,null,2)) : (dom.className="result alert-danger",dom.innerText=data.msg);
        }
    </script>
</body>
</html>
