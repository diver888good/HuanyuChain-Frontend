<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频存证 - 寰域链 V8.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="personal_center.html">个人中心</a>
                <a href="dashboard.html">管理面板</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html" class="active">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button id="logoutBtn" class="btn-secondary" onclick="logout()">退出</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <div class="card-header"><h3>视频哈希存证</h3></div>
            <div class="card-body">
                <input type="file" id="videoFile" accept="video/*" style="margin:10px 0;">
                <button class="btn-primary" onclick="getVideoHash()">生成视频哈希</button>
                
                <div style="margin:15px 0;">
                    <label>哈希值：</label>
                    <input type="text" id="videoHash" readonly style="width:100%; padding:8px; margin-top:5px;">
                </div>

                <button class="btn-primary" onclick="submitVideoCert()">提交视频存证</button>
                <div id="certResult" style="margin-top:15px; padding:10px; border-radius:6px;"></div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const isLogin = await verifyToken();
            if (!isLogin) {
                alert("请先登录！");
                location.href = "index.html";
                return;
            }
            showUserInfo();
        });

        function getVideoHash() {
            const file = videoFile.files[0];
            if (!file) {
                alert("请选择视频文件！");
                return;
            }
            const reader = new FileReader();
            reader.readAsArrayBuffer(file);
            reader.onload = (e) => {
                const wordArray = CryptoJS.lib.WordArray.create(e.target.result);
                const hash = CryptoJS.SHA256(wordArray).toString();
                videoHash.value = hash;
                alert("✅ 视频哈希生成成功！");
            };
        }

        async function submitVideoCert() {
            const hash = videoHash.value.trim();
            if (!hash) {
                alert("请先生成视频哈希！");
                return;
            }
            try{
                let res = await httpPost("/api/cert/video",{video_hash:hash});
                certResult.innerText = res.msg;
            }catch(e){
                certResult.innerText = "提交失败";
            }
        }

        function showUserInfo(){
            let u = JSON.parse(localStorage.getItem("userInfo")||"{}");
            username.innerText = u.username||"";
            userInfo.style.display = "block";
        }
    </script>
</body>
</html>
