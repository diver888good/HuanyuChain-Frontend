<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频存证 - 寰域链 V8.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="dashboard.html">管理面板</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html" class="active">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button id="logoutBtn" class="btn-secondary">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>视频存证（上传自动计算哈希）</h3></div>
            <div class="card-body">
                <!-- 视频上传 -->
                <input type="file" id="videoFile" accept="video/*" placeholder="选择视频文件">
                <button class="btn-primary" onclick="generateVideoHash()" id="hashBtn">生成视频哈希</button>
                
                <!-- 自动填充字段 -->
                <input id="videoDid" placeholder="DID（自动填充）" readonly>
                <input id="videoHash" placeholder="视频哈希（自动生成）" readonly>
                
                <button class="btn-primary" onclick="videoCertSubmit()" id="videoBtn">提交存证</button>
                <div id="videoResult" class="result"></div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        // 页面初始化：校验登录 + 自动填充DID
        document.addEventListener('DOMContentLoaded', async () => {
            await verifyToken();
            // 自动读取本地存储的DID（从DID页面生成后自动保存）
            const userDid = localStorage.getItem("user_did") || "";
            document.getElementById("videoDid").value = userDid;
        });

        // 核心功能：上传视频 → 自动计算哈希
        function generateVideoHash() {
            const file = document.getElementById("videoFile").files[0];
            const btn = document.getElementById("hashBtn");
            const hashInput = document.getElementById("videoHash");

            if (!file) {
                alert("请先选择视频文件！");
                return;
            }

            // 防重复点击
            btn.disabled = true;
            btn.innerText = "计算中...";
            hashInput.value = "";

            // 读取视频文件生成哈希
            const reader = new FileReader();
            reader.readAsArrayBuffer(file);
            reader.onload = function (e) {
                const array = new Uint8Array(e.target.result);
                let hash = "";
                for (let i = 0; i < array.length; i++) {
                    hash += array[i].toString(16).padStart(2, "0");
                }
                // 取64位作为哈希值
                hashInput.value = hash.slice(0, 64);
                btn.disabled = false;
                btn.innerText = "生成视频哈希";
            };
        }

        // 提交存证（原有功能优化）
        async function videoCertSubmit() {
            const btn = document.getElementById("videoBtn");
            const dom = document.getElementById("videoResult");
            
            const did = document.getElementById("videoDid").value.trim();
            const hash = document.getElementById("videoHash").value.trim();

            if (!did || !hash) {
                dom.className = "result alert-danger";
                dom.innerText = "请先生成DID和视频哈希！";
                return;
            }

            btn.disabled = true;
            btn.innerText = "提交中...";
            dom.innerText = "";

            try {
                const data = await httpPost("/api/video/cert", {
                    did: did,
                    video_hash: hash
                });
                if (data.code === 200) {
                    dom.className = "result alert-success";
                    dom.innerText = "✅ 视频存证成功：\n" + JSON.stringify(data.data, null, 2);
                } else {
                    dom.className = "result alert-danger";
                    dom.innerText = data.msg || "存证失败";
                }
            } catch (error) {
                dom.className = "result alert-danger";
                dom.innerText = "网络异常，请重试";
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerText = "提交存证";
            }
        }
    </script>
</body>
</html>
