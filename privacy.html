        input{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:6px;margin:8px 0;box-sizing:border-box;}
    </style>
</head>
<body>

</div>
<div class="side-bar">
    <a href="dashboard.html">系统首页</a>

</div>
<div class="main-content">
    <div class="card">
        <h2>PSI隐私集合求交</h2>
        <p>功能：多方数据求交集，原始数据隐私不泄露</p>
        <p>示例：数组A:[1,2,3,4,5]  数组B:[3,4,5,6,7]</p>
        <button class="btn" onclick="runPsiCalc()">执行隐私求交</button>
        <p id="psiResult" class="result-tip"></p>
    </div>

    <div class="card">
        <h2>联邦学习均值计算</h2>
        <p>功能：多方数据算均值，数据不出本地、隐私保护</p>
        <input type="text" id="numArr" placeholder="输入数字逗号分隔 例:10,20,30,40" value="10,20,30,40">
        <button class="btn" onclick="runAvgCalc()">计算联邦均值</button>
        <p id="avgResult" class="result-tip"></p>
    </div>
</div>

<script src="app.js"></script>
<script>
fillUserInfo();

// 🔥 修复：增加 try/catch 防止报错，逻辑完全不变
async function runPsiCalc(){
    try {
        let data = {list_a:[1,2,3,4,5],list_b:[3,4,5,6,7]};
        let res = await httpPost('/api/privacy/psi',data);
        document.getElementById('psiResult').innerText = "✅ 交集结果："+JSON.stringify(res.data);
    } catch (error) {
        alert("⚠️ 隐私求交服务连接失败");
        console.error(error);
    }
}

// 🔥 修复：增加 try/catch 防止报错，逻辑完全不变
async function runAvgCalc(){
    try {
        let str = document.getElementById('numArr').value.trim();
        if(!str){
            alert("请输入数字！");
            return;
        }
        let arr = str.split(',').map(Number);
        arr = arr.filter(item => !isNaN(item));
        if(arr.length === 0){
            alert("输入格式错误，请输入逗号分隔的数字！");
            return;
        }
        let res = await httpPost('/api/privacy/federated-avg',{values:arr});
        document.getElementById('avgResult').innerText = "✅ 联邦均值："+res.data.avg;
    } catch (error) {
        alert("⚠️ 联邦计算服务连接失败");
        console.error(error);
    }
}
</script>
</body>
