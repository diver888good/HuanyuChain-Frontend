<div class="main-content">
    <div class="card">
        <h2>寰域链内置AI问答</h2>
        <textarea id="chatMsg" placeholder="输入你想问的问题" rows="4"></textarea>
        <button class="btn" onclick="sendAiChat()">发送提问</button>
        <div style="margin-top:20px;padding:15px;background:#f8f9fa;border-radius:6px;">
            <p>AI回复：<span id="aiReply"></span></p>
        </div>
    </div>
</div>
<script src="app.js"></script>
<script>
// 初始化用户信息
fillUserInfo();

// 核心修复：删除重复变量，直接使用完整接口地址（无语法错误）
async function sendAiChat(){
    let msg = document.getElementById('chatMsg').value.trim();
    let replyDom = document.getElementById('aiReply');

    // 空值判断
    if(!msg){
        replyDom.innerText = "请输入提问内容";
        return;
    }

    try {
        // 直接请求公网后端地址（解决服务器连接失败）
        let res = await httpPost('https://huanyuchain.pythonanywhere.com/api/ai/chat', { 
            content: msg 
        });
        
        if(res?.code === 200){
            replyDom.innerText = res.data.reply;
        } else {
            replyDom.innerText = "AI服务暂不可用";
        }
    } catch (error) {
        // 友好提示服务器错误
        replyDom.innerText = "⚠️ 服务器连接失败，请检查后端服务";
        console.error(error);
    }
}
</script>
