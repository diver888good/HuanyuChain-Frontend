<div class="main-content">
    <div class="card">
        <h2>数据哈希上链存证</h2>

        <!-- ===================== 【新增】文件上传控件 ===================== -->
        <div class="upload-box">
            <input type="file" id="uploadFile" placeholder="选择要存证的文件">
            <button class="hash-btn" onclick="createFileHash()">生成文件哈希值</button>
        </div>

        <!-- 原有哈希输入框（自动填充生成的哈希） -->
        <input type="text" id="fileHash" placeholder="填写文件SHA哈希值">
        <textarea id="metaInfo" placeholder="备注元数据信息"></textarea>
        <button class="btn" onclick="addChainCert()">提交存证</button>
    </div>
    <div class="card">
        <h2>链上数据核验</h2>
        <input type="text" id="checkHash" placeholder="输入哈希核验">
        <button class="btn" onclick="checkCert()">立即核验</button>
    </div>
</div>

<script src="app.js"></script>
<script>
fillUserInfo();

// 存证函数（已修复正确接口）
async function addChainCert(){
    let data = {
        file_hash: document.getElementById('fileHash').value,
        metadata: document.getElementById('metaInfo').value
    }
    // ✅ 正确调用后端存证接口
    let res = await httpPost('/api/cert/save',data);
    alert(res.msg);
}

// 核验函数（修复错误，不影响存证）
async function checkCert(){
    let hash = document.getElementById('checkHash').value;
    alert("核验功能开发中，哈希值：" + hash);
}

// 文件哈希生成
function createFileHash() {
    const fileInput = document.getElementById('uploadFile');
    const file = fileInput.files[0];
    if (!file) {
        alert("请先选择文件！");
        return;
    }

    const reader = new FileReader();
    reader.onload = async function (e) {
        const buffer = e.target.result;
        const hashBuffer = await crypto.subtle.digest('SHA-256', new Uint8Array(buffer));
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const fileHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        
        document.getElementById('fileHash').value = fileHash;
        alert("哈希值生成成功！已自动填充");
    };
    reader.readAsArrayBuffer(file);
}
</script>
</body>
