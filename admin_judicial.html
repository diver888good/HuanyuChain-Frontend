<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>司法存证报告</title>
    <link rel="stylesheet" href="style.css">
    <!-- ✅ 管理员权限校验（后台页面必备） -->
    <script>
    if(!localStorage.userInfo){
        alert("请先登录！");
        location.href="login.html";
    }
    let user = JSON.parse(localStorage.userInfo);
    if(user.user_role !== "admin"){
        alert("无后台管理权限！");
        location.href="user_center.html";
    }
    </script>
    <style>
        /* 新增：司法章样式 */
        .seal{color:#e63946;font-weight:bold;font-size:15px;}
        .pdf-link{color:#0066cc;font-weight:bold;text-decoration:underline;}
    </style>
</head>
<body>
<div class="top-nav">
    <div class="logo">寰域链 V8.0 管理后台</div>
    <div class="user-info">
        <span id="userName">管理员</span>
        <span class="logout-btn" onclick="userLogout()">退出登录</span>
    </div>
</div>
<div class="side-bar">
    <!-- ✅ 全部修改为 admin_ 前缀链接 -->
    <a href="admin_dashboard.html">系统首页</a>
    <a href="admin_realname.html">实名身份备案</a>
    <a href="admin_cert.html">链上数据存证</a>
    <a href="admin_did.html">DID身份管理</a>
    <a href="admin_video.html">视频司法存证</a>
    <a href="admin_gov.html">政务台账上链</a>
    <a href="admin_meta.html">元宇宙&NFT</a>
    <a href="admin_privacy.html">隐私计算服务</a>
    <a href="admin_judicial.html" class="active">司法存证报告</a>
    <a href="admin_audit.html">系统审计日志</a>
    <a href="admin_cross.html">跨链互通服务</a>
    <a href="admin_contract.html">智能合约管理</a>
    <a href="admin_iot.html">IoT设备存证</a>
    <a href="admin_market.html">数字资产市场</a>
    <a href="admin_ai.html">AI智能对话</a>
</div>
<div class="main-content">
    <div class="card">
        <h2>根据哈希获取司法存证报告</h2>
        <input type="text" id="reportHash" placeholder="填写存证哈希值">
        <button class="btn" onclick="getJudicialReport()">获取报告链接</button>
        <p id="reportUrl" style="margin-top:12px;"></p>
    </div>
</div>

<script src="app.js"></script>
<script>
fillUserInfo();

// 🔥 原有代码100%保留，无任何修改
async function getJudicialReport(){
    try {
        let hash = document.getElementById('reportHash').value.trim();
        if(!hash){
            alert("请输入存证哈希值！");
            return;
        }

        let res = await httpGet(`/api/judicial/report/${hash}`);
        if(res.code === 200){
            // 显示：PDF地址 + 电子公章 + 司法状态
            document.getElementById('reportUrl').innerHTML = `
                报告地址：<a class="pdf-link" href="${res.data.report_url}" target="_blank">${res.data.report_name}</a><br>
                <span class="seal">${res.data.seal_status} | ${res.data.seal}</span><br>
                核验状态：${res.data.valid}
            `;
        }else{
            alert(res.msg);
        }
    } catch (error) {
        alert("⚠️ 报告生成失败，请检查哈希值");
        console.error(error);
    }
}
</script>
</body>
</html>
