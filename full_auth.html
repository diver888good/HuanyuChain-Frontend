<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全链路权限认证</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">权限认证中心</h1>
            <a href="index.html">返回首页</a>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>三级权限管控</h3></div>
            <div class="card-body">
                <p>管理员/普通用户/访客权限区分</p>
            </div>
        </div>
    </main>
<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded',async ()=>{
    if(!await verifyToken()){
        location.href="index.html";
        return;
    }
    // 自动加载用户信息（不报错）
    showUserInfo();
});

// 安全版用户信息显示
function showUserInfo(){
    try {
        let user = JSON.parse(localStorage.getItem("userInfo") || "{}");
        let nameElem = document.getElementById("username");
        let boxElem = document.getElementById("userInfo");
        if(nameElem) nameElem.innerText = user.username || "";
        if(boxElem) boxElem.style.display = "block";
    } catch(e){}
}

// 退出登录（兼容所有页面）
function logout(){
    localStorage.clear();
    location.href = "index.html";
}
</script>
</body>
</html>
