<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完整强实名认证 - 寰域链V8.0</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-box{max-width:700px;margin:30px auto;padding:25px;background:#fff;border-radius:10px;box-shadow:0 0 10px #eee;}
        .item{margin:15px 0;}
        label{display:block;margin-bottom:6px;font-weight:500;}
        input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box;}
        .btn{padding:12px 25px;border:none;border-radius:6px;color:#fff;cursor:pointer;margin-right:10px;}
        .btn-primary{background:#2385ee;}
        .btn-warn{background:#f59e0b;}
        .tip{color:#666;font-size:14px;margin:5px 0;}
        .red-tip{color:red;}
        .result { margin: 15px 0; padding: 12px 15px; border-radius: 6px; line-height: 1.5; font-size: 14px; }
        .alert-success { background: #e6f7e6; color: #006600; border: 1px solid #c1eac1; }
        .alert-danger { background: #fff0f0; color: #cc0000; border: 1px solid #ffc9c9; }
    </style>
</head>
<body>
    <!-- 统一全局头部导航 -->
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="personal_center.html">个人中心</a>
                <a href="dashboard.html">管理面板</a>
                <a href="did_identity.html">DID身份</a>
                <a href="full_auth.html" class="active">实名认证</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button id="logoutBtn" class="btn-secondary">退出</button>
            </div>
        </div>
    </header>

    <div class="auth-box">
        <h3>🔐 全套强实名认证（开通司法存证权限）</h3>
        <p class="red-tip">温馨提示：一人一证一号，认证后终身绑定，不可重复注册</p>
        <p class="tip">必须先生成【终身主DID】才可提交实名</p>

        <div class="item">
            <label>真实姓名</label>
            <input type="text" id="realName" placeholder="请填写本人真实姓名">
        </div>

        <div class="item">
            <label>常用手机号</label>
            <input type="text" id="phone" placeholder="11位有效手机号">
        </div>

        <div class="item">
            <label>18位身份证号码</label>
            <input type="text" id="idCard" placeholder="请输入完整身份证号">
        </div>

        <div class="item">
            <label>出生年月日</label>
            <input type="date" id="birthDate">
        </div>

        <div class="item">
            <label>常住详细住址</label>
            <textarea id="address" rows="3" placeholder="省市区街道门牌号详细填写"></textarea>
        </div>

        <div class="item">
            <label>身份证正面照片</label>
            <input type="file" id="idFront" accept="image/*">
        </div>

        <div class="item">
            <label>身份证反面照片</label>
            <input type="file" id="idBack" accept="image/*">
        </div>

        <div class="item">
            <label>活体人脸识别核验</label>
            <button class="btn btn-warn" onclick="openFaceVerify()">开始人脸采集核验</button>
            <p class="tip">正对镜头完成活体检测，确保人证一致</p>
        </div>

        <div class="item">
            <button class="btn btn-primary" onclick="submitFullAuth()">提交完整实名认证</button>
        </div>

        <div id="msgBox" class="result" style="margin-top:20px;"></div>
    </div>

    <script src="app.js"></script>
    <script>
        let userId = "";
        let faceVerifyData = "";
        let frontPath = "";
        let backPath = "";

        // 统一全局初始化：登录校验 + 用户信息展示
        document.addEventListener('DOMContentLoaded', async () => {
            const isLogin = await verifyToken();
            if (!isLogin) {
                location.href = "login.html";
                return;
            }
            // 显示顶部用户信息
            showUserInfo();
            // 获取用户ID
            const userInfo = JSON.parse(localStorage.getItem("userInfo") || "{}");
            userId = userInfo.id;
        });

        // 模拟人脸核验弹窗
        function openFaceVerify(){
            alert("正在唤起活体人脸识别组件，请正对摄像头完成核验");
            faceVerifyData = "face_verify_success_" + new Date().getTime();
            alert("✅ 人脸核验通过，可提交实名！");
        }

        // 模拟图片上传
        document.getElementById("idFront").addEventListener("change",function(e){
            frontPath = "upload/id_front/" + new Date().getTime() + ".jpg";
        })
        document.getElementById("idBack").addEventListener("change",function(e){
            backPath = "upload/id_back/" + new Date().getTime() + ".jpg";
        })

        // 提交实名请求（适配后端接口）
        async function submitFullAuth(){
            const realName = document.getElementById("realName").value.trim();
            const phone = document.getElementById("phone").value.trim();
            const idCard = document.getElementById("idCard").value.trim();
            const birthDate = document.getElementById("birthDate").value;
            const address = document.getElementById("address").value.trim();
            const msgBox = document.getElementById("msgBox");

            // 前端基础校验
            if(!realName||!phone||!idCard||!birthDate||!address){
                msgBox.className = "result alert-danger";
                msgBox.innerText = "❌ 请填写完整所有实名信息";
                return;
            }
            if(!/^1[3-9]\d{9}$/.test(phone)){
                msgBox.className = "result alert-danger";
                msgBox.innerText = "❌ 手机号格式错误";
                return;
            }
            if(!/^\d{17}[\dXx]$/.test(idCard)){
                msgBox.className = "result alert-danger";
                msgBox.innerText = "❌ 身份证号码格式错误";
                return;
            }
            if(!faceVerifyData){
                msgBox.className = "result alert-danger";
                msgBox.innerText = "❌ 请先完成活体人脸识别核验";
                return;
            }

            const postData = {
                user_id: userId,
                real_name: realName,
                phone: phone,
                id_card: idCard,
                birth_date: birthDate,
                address: address,
                id_front_path: frontPath,
                id_back_path: backPath,
                face_data: faceVerifyData
            };

            try{
                const res = await httpPost("/api/auth/full-real-auth", postData);
                if(res.code === 200){
                    msgBox.className = "result alert-success";
                    msgBox.innerText = "✅ 实名认证成功！已绑定终身DID，解锁全部司法存证权限";
                    // 修复跳转：正确的DID身份页面
                    setTimeout(()=>{
                        location.href = "did_identity.html";
                    }, 2000);
                }else{
                    msgBox.className = "result alert-danger";
                    msgBox.innerText = `❌ ${res.msg || "实名失败"}`;
                }
            }catch(err){
                msgBox.className = "result alert-danger";
                msgBox.innerText = "❌ 网络请求失败，请重试";
                console.error(err);
            }
        }
    </script>
</body>
</html>
