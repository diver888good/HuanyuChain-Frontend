<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自主验签</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">本地自主验签</h1>
            <a href="index.html">返回首页</a>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>离线自主哈希核验</h3></div>
            <div class="card-body">
                <textarea id="srcContent" rows="5" placeholder="粘贴原始内容"></textarea>
                <button onclick="makeLocalHash()">生成本地哈希</button>
                <input type="text" id="localHash" readonly>
            </div>
        </div>
    </main>
<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
<script>
function makeLocalHash(){
    let s = srcContent.value.trim();
    if(!s)return;
    localHash.value = CryptoJS.SHA256(s).toString();
}
</script>
</body>
</html>
