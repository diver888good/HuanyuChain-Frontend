<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>寰域链V8.0 - 系统登录</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display:flex;align-items:center;justify-content:center;height:100vh;background:#1f2937;">
    <div class="card" style="width:420px;">
        <h2 style="text-align:center;">寰域链可信存证联盟链</h2>
        <input type="text" id="username" placeholder="请输入账号" value="admin">
        <input type="password" id="pwd" placeholder="请输入密码" value="admin123456">
        <button class="btn" style="width:100%;font-size:16px;" onclick="loginFunc()">立即登录</button>
    </div>

<script src="app.js"></script>
<script>
async function loginFunc(){
    let un = document.getElementById("username").value;
    let pw = document.getElementById("pwd").value;
    let res = await httpPost("/api/auth/login",{username:un,password:pw});
    if(res.code===200){
        localStorage.setItem("token",res.data.token);
        localStorage.setItem("userInfo",JSON.stringify(res.data));
        // ✅ 修正：跳转到修改后的后台首页
        location.href="admin_dashboard.html";
    }else{
        alert(res.msg);
    }
}
</script>
</body>
</html>
