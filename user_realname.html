<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寰域链 - 强身份实名备案</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 前台专属简洁样式 + 后台统一样式 */
        .front-header{
            background:#1f2937;
            color:#fff;
            padding:16px 30px;
            font-size:18px;
            font-weight:bold;
        }
        .front-container{
            max-width:800px;
            margin:30px auto;
            padding:0 20px;
        }
        .auth-tab{display:flex; gap:12px; margin:15px 0;}
        .auth-tab span{padding:8px 16px; border:1px solid #3b82f6; border-radius:6px; cursor:pointer;}
        .auth-tab .active{background:#3b82f6; color:#fff;}
        .upload-group{margin:12px 0;}
        .warn-tip{color:#ef4444; font-size:13px; margin-bottom:10px;}
        .hide{display:none;}
        .real-btn{background:#165DFF;color:#fff;border:none;padding:8px 16px;border-radius:6px;margin:5px;cursor:pointer;}
        .back-btn{
            background:#64748b;
            color:#fff;
            border:none;
            padding:8px 16px;
            border-radius:6px;
            cursor:pointer;
            margin-bottom:15px;
        }
        /* 与后台完全统一的知情承诺样式 */
        .commit-box{
            margin:12px 0; 
            padding:15px; 
            background:#fff4f4; 
            border:2px solid #ff3333; 
            border-radius:8px;
            font-size:16px;
            font-weight:bold;
        }
        #commit{
            width:25px;
            height:25px;
            margin-right:10px;
            vertical-align:middle;
        }
        .upload-item{margin:10px 0;}
        canvas{border:1px solid #ccc; border-radius:6px;}
        .btn:disabled{background:#ccc; cursor:not-allowed; opacity:0.7;}
    </style>
</head>
<body>

<!-- 前台专属头部 -->
<div class="front-header">
    寰域链 V8.0 - 强身份实名备案
</div>

<!-- 前台主内容区 -->
<div class="front-container">
    <button class="back-btn" onclick="location.href='index.html'">← 返回用户中心</button>

    <div class="card">
        <h2>用户强实名确权（一次性确权·终身封存本源身份）</h2>
        <p class="warn-tip">⚠️ 首次确权资料永久封存不可修改，每次使用密钥自动人脸比对并动态更新生物信息</p>

        <!-- 与后台完全一致：醒目知情承诺复选框 -->
        <div class="commit-box">
            <input type="checkbox" id="commit"> 
            <label>本人知晓规则：首次资料永久存档，日常使用必做人脸活体核验（必选！）</label>
        </div>

        <div class="auth-tab">
            <span class="active" onclick="switchAuth(1)">个人实名确权</span>
            <span onclick="switchAuth(2)">企业实名确权</span>
        </div>

        <!-- 个人实名（与后台完全一致 + 身份证上传+人脸采集） -->
        <div id="personAuth">
            <input type="text" id="realName" placeholder="真实姓名">
            <input type="text" id="phone" placeholder="手机号码">
            <input type="text" id="idCard" placeholder="身份证号码">
            <input type="text" id="birth" placeholder="出生日期">
            <input type="text" id="address" placeholder="常住地址">

            <!-- 身份证上传（和后台一致） -->
            <div class="upload-item">
                <label>上传身份证正面照片：</label>
                <input type="file" id="idFrontFile" accept="image/*">
            </div>
            <div class="upload-item">
                <label>上传身份证反面照片：</label>
                <input type="file" id="idBackFile" accept="image/*">
            </div>

            <!-- 人脸抓拍（和后台一致） -->
            <div class="upload-item">
                <p>采集初代基准人脸（永久身份基准）</p>
                <video id="faceVideo" width="300" height="220"></video>
                <canvas id="faceCanvas" width="300" height="220" class="hide"></canvas>
                <button class="real-btn" onclick="captureFace()">抓拍基准人脸</button>
            </div>
        </div>

        <!-- 企业实名（和后台完全一致） -->
        <div id="companyAuth" class="hide">
            <input type="text" id="company_name" placeholder="企业全称">
            <input type="text" id="credit_code" placeholder="统一社会信用代码">
            <input type="text" id="legal_person" placeholder="法人姓名">
            <input type="text" id="legal_phone" placeholder="法人联系电话">
            <input type="text" id="company_address" placeholder="企业注册地址">
        </div>

        <!-- 按钮与后台完全统一 -->
        <br>
        <button class="real-btn" id="checkBtn" onclick="startAllCheck()">一键三方比对核验</button>
        <button class="btn" id="submitBtn" onclick="finalConfirmEncrypt()" disabled>提交确权 本源身份加密封存</button>

        <div class="key-box hide" id="userSecretKeyBox" style="margin-top:15px;padding:12px;background:#eef5ff;border-radius:6px;word-break:break-all;">
            <h4>✅ 确权成功 终身身份加密密钥</h4>
            <p id="userSecretKey"></p>
            <p style="font-size:13px;color:#165DFF">每次使用请输入此密钥，强制人脸比对后方可使用权限</p>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
// 验证用户登录
if(!localStorage.userInfo){
    alert("请先登录！");
    location.href="login.html";
}

fillUserInfo();
let authType = 1;
let allCheckPass = false;
let faceBase64 = "";
let idFrontBase64 = "";
let idBackBase64 = "";
let videoStream = null;

// 实时监听复选框，和后台逻辑一致
document.getElementById('commit').addEventListener('change', function() {
    const isChecked = this.checked;
    document.getElementById('checkBtn').disabled = !isChecked;
    if (!isChecked) {
        document.getElementById('submitBtn').disabled = true;
        allCheckPass = false;
    }
});

function getUserId() {
    try { return JSON.parse(localStorage.userInfo).user_id || 1; } catch (e) { return 1; }
}

function switchAuth(type){
    authType = type;
    document.querySelectorAll('.auth-tab span').forEach((item,i)=>{
        item.classList.toggle('active', i+1===type);
    });
    document.getElementById('personAuth').classList.toggle('hide', type!==1);
    document.getElementById('companyAuth').classList.toggle('hide', type!==2);
}

window.onload = function(){
    initCamera();
    // 身份证文件上传转base64
    document.getElementById('idFrontFile').addEventListener('change',e=>{
        let file = e.target.files[0];
        if(file) getImgBase64(file,str=>idFrontBase64=str);
    })
    document.getElementById('idBackFile').addEventListener('change',e=>{
        let file = e.target.files[0];
        if(file) getImgBase64(file,str=>idBackBase64=str);
    })
    // 初始化按钮禁用
    document.getElementById('checkBtn').disabled = true;
    document.getElementById('submitBtn').disabled = true;
}

// 初始化摄像头
function initCamera(){
    let video = document.getElementById('faceVideo');
    navigator.mediaDevices.getUserMedia({video:true})
    .then(stream=>{
        videoStream = stream;
        video.srcObject = stream;
    })
}

// 抓拍基准人脸
function captureFace(){
    let video = document.getElementById('faceVideo');
    let canvas = document.getElementById('faceCanvas');
    let ctx = canvas.getContext('2d');
    ctx.drawImage(video,0,0,300,220);
    faceBase64 = canvas.toDataURL("image/jpeg");
    alert("✅ 初代基准人脸采集完成，作为永久身份比对依据");
}

// 图片转base64
function getImgBase64(file,cb){
    let reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = ()=>cb(reader.result);
}

// 一键三方比对（和后台接口一致）
async function startAllCheck(){
    if(!document.getElementById('commit').checked){
        alert("请先阅读并勾选知情承诺");
        return;
    }
    if(!idFrontBase64 || !idBackBase64 || !faceBase64){
        alert("请上传身份证正反照+采集基准人脸");
        return;
    }
    let name = document.getElementById('realName').value;
    let card = document.getElementById('idCard').value;
    let phone = document.getElementById('phone').value;
    if(!name||!card||!phone){
        alert("请填写完整身份信息");
        return;
    }
    let data = {
        user_id:getUserId(),
        real_name:name,id_card:card,phone:phone,
        id_front:idFrontBase64,id_back:idBackBase64,base_face:faceBase64
    }
    try{
        let res = await httpPost("/api/auth/service/all-three-check",data);
        if(res.code===200){
            allCheckPass = true;
            document.getElementById('submitBtn').disabled = false;
            alert("✅ 文本+证件+基准人脸三方比对通过，可封存本源身份");
        }else{
            alert("❌ 核验失败："+res.msg);
        }
    }catch(e){
        alert("核验服务异常");
    }
}

// 提交确权（和后台接口完全一致）
async function finalConfirmEncrypt(){
    if(!allCheckPass){
        alert("请先完成三方信息比对核验");
        return;
    }
    let data = {
        user_id:getUserId(),
        real_name:document.getElementById('realName').value,
        id_card:document.getElementById('idCard').value,
        phone:document.getElementById('phone').value,
        birth:document.getElementById('birth').value,
        address:document.getElementById('address').value
    }
    try{
        let res = await httpPost("/api/auth/service/final-encrypt-save",data);
        if(res.code===200){
            // 清空表单
            document.getElementById('realName').value = "";
            document.getElementById('idCard').value = "";
            document.getElementById('phone').value = "";
            document.getElementById('birth').value = "";
            document.getElementById('address').value = "";
            document.getElementById('idFrontFile').value = "";
            document.getElementById('idBackFile').value = "";
            idFrontBase64 = "";idBackBase64 = "";faceBase64 = "";
            if(videoStream) videoStream.getTracks().forEach(t=>t.stop());

            document.getElementById('userSecretKeyBox').classList.remove('hide');
            document.getElementById('userSecretKey').innerText = res.data.secret_key;
            document.getElementById("submitBtn").disabled = true;
            document.getElementById("submitBtn").innerText = "✅ 本源身份已永久加密封存";
            alert("✅ 首次确权完成！本源资料永久存档，日常使用强制人脸动态比对");
        }
    }catch(e){
        alert("加密封存失败");
    }
}
</script>
</body>
</html>
