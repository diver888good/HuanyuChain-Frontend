<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统审计日志</title>
    <link rel="stylesheet" href="style.css">
    <!-- ✅ 管理员权限校验（后台页面必备） -->
    <script>
    if(!localStorage.userInfo){
        alert("请先登录！");
        location.href="login.html";
    }
    let user = JSON.parse(localStorage.userInfo);
    if(user.user_role !== "admin"){
        alert("无后台管理权限！");
        location.href="user_center.html";
    }
    </script>
    <style>
        /* 仅优化日志展示样式，不破坏原有布局 */
        #logBox p {
            padding: 10px 12px;
            margin: 8px 0;
            background: #f9fafb;
            border-radius: 6px;
            font-size: 14px;
            color: #374151;
            border-left: 3px solid #165DFF;
        }
        .empty-tip {
            color: #6b7280;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="top-nav">
    <div class="logo">寰域链 V8.0 管理后台</div>
    <div class="user-info">
        <span id="userName">管理员</span>
        <span class="logout-btn" onclick="userLogout()">退出登录</span>
    </div>
</div>
<div class="side-bar">
    <!-- ✅ 全部修改为 admin_ 前缀链接 -->
    <a href="admin_dashboard.html">系统首页</a>
    <a href="admin_realname.html">实名身份备案</a>
    <a href="admin_cert.html">链上数据存证</a>

    <a href="admin_video.html">视频司法存证</a>
    <a href="admin_gov.html">政务台账上链</a>
    <a href="admin_meta.html">元宇宙&NFT</a>

    <a href="admin_judicial.html">司法存证报告</a>
    <a href="admin_audit.html" class="active">系统审计日志</a>
    <a href="admin_cross.html">跨链互通服务</a>

    <a href="admin_ai.html">AI智能对话</a>
</div>
<div class="main-content">
    <div class="card">
        <h2>查看系统操作审计日志</h2>
        <button class="btn" onclick="loadAuditLog()">加载最新日志</button>
        <div id="logBox" style="margin-top:20px;"></div>
    </div>
</div>
<script src="app.js"></script>
<script>
fillUserInfo();
// ===================== 原有代码 100% 保留 =====================
async function loadAuditLog(){
    let res = await httpGet('/api/audit/list');
    let html = '';
    if (!res.data || res.data.length === 0) {
        html = '<p class="empty-tip">暂无系统操作日志</p>';
    } else {
        res.data.forEach(item=>{
            html += `<p>操作：${item.operation}  IP：${item.ip}  时间：${item.time}</p>`
        })
    }
    document.getElementById('logBox').innerHTML = html;
}
</script>
</body>
</html>
