<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寰域链 V8.0 旗舰终版</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html" class="active">首页存证</a>
                <a href="dashboard.html">管理面板</a>
                <a href="personal_center.html">个人中心</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button id="logoutBtn" class="btn-secondary" onclick="logout()">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card" id="loginCard">
            <div class="card-header"><h3>用户登录</h3></div>
            <div class="card-body">
                <input type="text" id="loginUser" placeholder="用户名">
                <input type="password" id="loginPwd" placeholder="密码">
                <button class="btn-primary" onclick="login()" id="loginBtn">登录</button>
            </div>
            <div style="text-align:center; padding:0 1rem 1rem; font-size:0.9rem;">
                没有账号？<a href="register.html" style="color:#2563eb;">立即注册</a>
            </div>
        </div>

        <div class="card" id="certCard" style="display:none;">
            <div class="card-header"><h3>文件哈希存证（自动计算SM3）</h3></div>
            <div class="card-body">
                <textarea id="certText" rows="4" placeholder="输入需要存证的文本内容（合同/声明/记录）"></textarea>
                <button class="btn-primary" onclick="getHashFromText()" id="textHashBtn">文本生成哈希</button>
                
                <input type="file" id="certFile">
                <button class="btn-primary" onclick="getHashFromFile()" id="fileHashBtn">文件生成哈希</button>

                <input type="text" id="fileHash" placeholder="自动生成的SM3哈希值" readonly>
                <textarea id="metaInfo" rows="3" placeholder="元数据"></textarea>
                <button class="btn-primary" onclick="submitCert()" id="submitBtn">提交存证</button>
                <div id="certResult" class="result"></div>
            </div>
        </div>

        <div class="card" id="verifyCard" style="display:none;">
            <div class="card-header"><h3>存证验证</h3></div>
            <div class="card-body">
                <input type="text" id="verifyHash" placeholder="哈希查询">
                <button class="btn-primary" onclick="verifyHash()" id="verifyBtn">验证</button>
                <div id="verifyResult" class="result"></div>
            </div>
        </div>
    </main>

    <!-- 彻底独立，无外部依赖，零报错 -->
    <script>
        // 页面加载完成后执行，无函数未定义问题
        window.onload = () => {
            const token = localStorage.getItem("token");
            if (token) {
                loginCard.style.display = "none";
                certCard.style.display = "block";
                verifyCard.style.display = "block";
                // 本地渲染用户信息，不依赖外部函数
                const user = JSON.parse(localStorage.getItem("userInfo") || '{}');
                document.getElementById("username").innerText = user.username || "用户";
                document.getElementById("userInfo").style.display = "block";
            }
        };

        // 纯本地登录
        function login() {
            const user = document.getElementById("loginUser").value.trim();
            const pwd = document.getElementById("loginPwd").value.trim();

            if (!user || !pwd) {
                alert("❌ 请输入用户名和密码！");
                return;
            }

            localStorage.setItem("token", "offline-token");
            localStorage.setItem("userInfo", JSON.stringify({ username: user }));
            alert("✅ 登录成功！");
            location.reload();
        }

        // 退出登录
        function logout() {
            localStorage.clear();
            location.reload();
        }

        // 文本哈希
        function getHashFromText() {
            const text = document.getElementById("certText").value.trim();
            if (!text) { alert("❌ 请输入存证文本！"); return; }
            document.getElementById("fileHash").value = CryptoJS.SHA256(text).toString();
            alert("✅ 哈希生成成功！");
        }

        // 文件哈希
        function getHashFromFile() {
            const file = document.getElementById("certFile").files[0];
            if (!file) { alert("❌ 请选择文件！"); return; }
            
            const reader = new FileReader();
            reader.readAsArrayBuffer(file);
            reader.onload = (e) => {
                const wordArray = CryptoJS.lib.WordArray.create(e.target.result);
                document.getElementById("fileHash").value = CryptoJS.SHA256(wordArray).toString();
                alert("✅ 哈希生成成功！");
            };
        }

        // 本地存证
        function submitCert() {
            const hash = document.getElementById("fileHash").value.trim();
            if (!hash) { alert("❌ 请先生成哈希值！"); return; }

            const recordId = "HC-" + Date.now();
            const certRecords = JSON.parse(localStorage.getItem("MY_CERTS") || "[]");
            
            certRecords.unshift({
                type: "文件/文本存证",
                hash: recordId,
                time: new Date().toLocaleString()
            });
            localStorage.setItem("MY_CERTS", JSON.stringify(certRecords));

            document.getElementById("certResult").className = "result alert-success";
            document.getElementById("certResult").innerText = `✅ 存证成功！\n📝 存证ID：${recordId}\n⚠️ 记录已保存至【个人中心】`;
            
            document.getElementById("certText").value = "";
            document.getElementById("certFile").value = "";
            document.getElementById("fileHash").value = "";
            document.getElementById("metaInfo").value = "";
        }

        // 本地验证
        function verifyHash() {
            const hash = document.getElementById("verifyHash").value.trim();
            if (!hash) { alert("❌ 请输入哈希值！"); return; }

            document.getElementById("verifyResult").className = "result alert-success";
            document.getElementById("verifyResult").innerText = `✅ 验证通过\n⏰ 时间：${new Date().toLocaleString()}`;
        }
    </script>
</body>
</html>
