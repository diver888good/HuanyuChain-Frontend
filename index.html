<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寰域链 V8.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html" class="active">首页存证</a>
                <a href="dashboard.html">管理面板</a>
                <a href="personal_center.html">个人中心</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙资产</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display:none">
                <span id="username"></span>
                <button class="btn-secondary" onclick="logout()">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card" id="loginBox">
            <div class="card-header"><h3>用户登录</h3></div>
            <div class="card-body">
                <input type="text" id="uname" placeholder="用户名">
                <input type="password" id="upwd" placeholder="密码">
                <button class="btn-primary" onclick="userLogin()">登录</button>
                <p style="text-align:center;margin-top:10px">没有账号 <a href="register.html">立即注册</a></p>
            </div>
        </div>
        <div class="card" id="certBox" style="display:none">
            <div class="card-header"><h3>可信数据存证</h3></div>
            <div class="card-body">
                <textarea id="certText" rows="4" placeholder="输入存证文本"></textarea>
                <button onclick="textHash()">文本生成哈希</button>
                <input type="file" id="fileUp">
                <button onclick="fileHash()">文件生成哈希</button>
                <input type="text" id="hashVal" readonly placeholder="哈希值">
                <textarea id="metaData" rows="2" placeholder="备注元数据"></textarea>
                <button onclick="submitCert()">提交存证</button>
                <div id="resText"></div>
            </div>
        </div>
        <div class="card" id="checkBox" style="display:none">
            <div class="card-header"><h3>存证核验</h3></div>
            <div class="card-body">
                <input type="text" id="checkKey" placeholder="输入哈希/存证ID">
                <button onclick="checkCertInfo()">核验</button>
                <div id="checkRes"></div>
            </div>
        </div>
    </main>
<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded',async function(){
    let ok = await verifyToken();
    if(ok){
        loginBox.style.display="none";
        certBox.style.display="block";
        checkBox.style.display="block";
        showUserInfo();
    }
})

async function userLogin(){
    let u = uname.value.trim();
    let p = upwd.value.trim();
    if(!u||!p)return alert("请填写账号密码");
    let res = await httpPost("/api/auth/login",{username:u,password:p});
    if(res.code===200){
        localStorage.setItem("token",res.data.token);
        localStorage.setItem("userInfo",JSON.stringify(res.data.user));
        alert("登录成功");
        location.reload();
    }else{
        alert(res.msg);
    }
}

function textHash(){
    let t = certText.value.trim();
    if(!t)return alert("请输入内容");
    hashVal.value = CryptoJS.SHA256(t).toString();
}

function fileHash(){
    let f = fileUp.files[0];
    if(!f)return alert("请选择文件");
    let r = new FileReader();
    r.readAsArrayBuffer(f);
    r.onload=e=>{
        let w = CryptoJS.lib.WordArray.create(e.target.result);
        hashVal.value = CryptoJS.SHA256(w).toString();
    }
}

async function submitCert(){
    let h = hashVal.value.trim();
    let m = metaData.value.trim();
    if(!h)return alert("请生成哈希");
    let res = await httpPost("/api/cert/add",{hash_value:h,meta_data:m});
    resText.innerText = res.msg;
}

async function checkCertInfo(){
    let k = checkKey.value.trim();
    if(!k)return;
    let res = await httpGet(`/api/cert/query?key=${k}`);
    checkRes.innerText = res.msg;
}

function showUserInfo(){
    let info = JSON.parse(localStorage.getItem("userInfo")||"{}");
    username.innerText = info.username||"";
    userInfo.style.display = "block";
}
</script>
</body>
</html>
