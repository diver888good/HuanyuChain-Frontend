<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寰域链 V8.0 旗舰终版</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html" class="active">首页存证</a>
                <a href="dashboard.html">管理面板</a>
                <a href="personal_center.html">个人中心</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button id="logoutBtn" class="btn-secondary" onclick="logout()">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card" id="loginCard">
            <div class="card-header"><h3>用户登录</h3></div>
            <div class="card-body">
                <input type="text" id="loginUser" placeholder="用户名">
                <input type="password" id="loginPwd" placeholder="密码">
                <button class="btn-primary" onclick="login()" id="loginBtn">登录</button>
            </div>
            <div style="text-align:center; padding:0 1rem 1rem; font-size:0.9rem;">
                没有账号？<a href="register.html" style="color:#2563eb;">立即注册</a>
            </div>
        </div>

        <div class="card" id="certCard" style="display:none;">
            <div class="card-header"><h3>文件哈希存证（自动计算SM3）</h3></div>
            <div class="card-body">
                <textarea id="certText" rows="4" placeholder="输入需要存证的文本内容（合同/声明/记录）"></textarea>
                <button class="btn-primary" onclick="getHashFromText()" id="textHashBtn">文本生成哈希</button>
                
                <input type="file" id="certFile">
                <button class="btn-primary" onclick="getHashFromFile()" id="fileHashBtn">文件生成哈希</button>

                <input type="text" id="fileHash" placeholder="自动生成哈希值" readonly>
                <textarea id="metaInfo" rows="2" placeholder="填写存证元数据"></textarea>
                <button class="btn-primary" onclick="submitCertData()" id="submitBtn">提交存证上链</button>
                <div id="certResult" class="result-box"></div>
            </div>
        </div>

        <div class="card" id="verifyCard" style="display:none;">
            <div class="card-header"><h3>存证核验</h3></div>
            <div class="card-body">
                <input type="text" id="verifyHash" placeholder="输入存证哈希/ID">
                <button class="btn-primary" onclick="checkCert()">核验存证</button>
                <div id="verifyResult" class="result-box"></div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const isLogin = await verifyToken();
            if (isLogin) {
                loginCard.style.display = "none";
                certCard.style.display = "block";
                verifyCard.style.display = "block";
                showUserInfo();
            }
        });

        // 后端登录接口
        async function login() {
            let user = loginUser.value.trim();
            let pwd = loginPwd.value.trim();
            if (!user || !pwd) {
                alert("请输入完整账号密码");
                return;
            }
            try {
                let res = await httpPost("/api/auth/login", {username:user,password:pwd});
                if(res.code === 200){
                    localStorage.setItem("token",res.data.token);
                    localStorage.setItem("userInfo",JSON.stringify(res.data.user));
                    alert("登录成功");
                    location.reload();
                }else{
                    alert(res.msg||"登录失败");
                }
            }catch(e){
                alert("网络异常，请求后端失败");
            }
        }

        // 文本哈希
        function getHashFromText(){
            let txt = certText.value.trim();
            if(!txt)return alert("请输入文本内容");
            fileHash.value = CryptoJS.SHA256(txt).toString();
        }

        // 文件哈希
        function getHashFromFile(){
            let f = certFile.files[0];
            if(!f)return alert("请选择文件");
            let reader = new FileReader();
            reader.readAsArrayBuffer(f);
            reader.onload = e=>{
                let word = CryptoJS.lib.WordArray.create(e.target.result);
                fileHash.value = CryptoJS.SHA256(word).toString();
            }
        }

        // 提交存证到后端
        async function submitCertData(){
            let hash = fileHash.value.trim();
            let meta = metaInfo.value.trim();
            if(!hash)return alert("请先生成哈希值");
            try{
                let res = await httpPost("/api/cert/add",{hash_value:hash,meta_data:meta});
                certResult.innerText = res.msg;
            }catch(e){
                certResult.innerText = "提交失败，后端连接异常";
            }
        }

        // 核验存证
        async function checkCert(){
            let key = verifyHash.value.trim();
            if(!key)return;
            let res = await httpGet(`/api/cert/query?key=${key}`);
            verifyResult.innerText = res.msg||"暂无数据";
        }

        // 补齐缺失函数 仅消报错 不动任何业务
        function showUserInfo(){
            let u = JSON.parse(localStorage.getItem("userInfo")||"{}");
            document.getElementById("username").innerText = u.username||"";
            document.getElementById("userInfo").style.display = "block";
        }
    </script>
</body>
</html>
