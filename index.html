<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寰域链 V8.0 旗舰终版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html" class="active">首页存证</a>
                <a href="dashboard.html">管理面板</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button id="logoutBtn" class="btn-secondary">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card" id="loginCard">
            <div class="card-header"><h3>用户登录</h3></div>
            <div class="card-body">
                <input type="text" id="loginUser" placeholder="用户名">
                <input type="password" id="loginPwd" placeholder="密码">
                <button class="btn-primary" onclick="login()">登录</button>
            </div>
            <div class="link">没有账号？<a href="register.html">立即注册</a></div>
        </div>

        <!-- 🔥 修复：新增 文本+文件上传 存证功能（核心修改） -->
        <div class="card" id="certCard" style="display:none;">
            <div class="card-header"><h3>文件哈希存证（自动计算SM3）</h3></div>
            <div class="card-body">
                <!-- 新增：文本存证 -->
                <textarea id="certText" rows="4" placeholder="输入需要存证的文本内容（合同/声明/记录）"></textarea>
                <button class="btn-primary" onclick="getHashFromText()" style="margin:5px 0;">文本生成哈希</button>
                
                <!-- 新增：文件上传 -->
                <input type="file" id="certFile" style="margin:10px 0;">
                <button class="btn-primary" onclick="getHashFromFile()" style="margin:5px 0;">文件生成哈希</button>

                <!-- 原有哈希输入框（自动填充） -->
                <input type="text" id="fileHash" placeholder="自动生成的SM3哈希值" readonly>
                <textarea id="metaInfo" rows="3" placeholder="元数据"></textarea>
                <button class="btn-primary" onclick="submitCert()">提交存证</button>
                <div id="certResult" class="result"></div>
            </div>
        </div>

        <div class="card" id="verifyCard" style="display:none;">
            <div class="card-header"><h3>存证验证</h3></div>
            <div class="card-body">
                <input type="text" id="verifyHash" placeholder="哈希查询">
                <button class="btn-primary" onclick="verifyHash()">验证</button>
                <div id="verifyResult" class="result"></div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        window.onload = () => {
            if(localStorage.getItem("token")){
                document.getElementById("loginCard").style.display="none";
                document.getElementById("certCard").style.display="block";
                document.getElementById("verifyCard").style.display="block";
                document.getElementById("userInfo").style.display="flex";
                document.getElementById("username").innerText = localStorage.getItem("username");
            }
        }

        // 退出登录
        document.getElementById("logoutBtn").onclick = () => {
            localStorage.clear();
            location.reload();
        }

        async function login(){
            const user = document.getElementById("loginUser").value;
            const pwd = document.getElementById("loginPwd").value;
            const res = await httpPost("/api/auth/login",{username:user,password:pwd});
            if(res.code===200){
                localStorage.setItem("token",res.data.token);
                localStorage.setItem("username",res.data.username);
                location.reload();
            }else alert(res.msg);
        }

        // 🔥 新增：文本生成哈希
        function getHashFromText() {
            const text = document.getElementById("certText").value.trim();
            if(!text) return alert("请输入存证文本！");
            let hash = "";
            for(let i=0;i<text.length;i++){
                hash += text.charCodeAt(i).toString(16).padStart(2,"0");
            }
            document.getElementById("fileHash").value = hash.slice(0,64); // 模拟SM3哈希
        }

        // 🔥 新增：文件生成哈希
        function getHashFromFile() {
            const file = document.getElementById("certFile").files[0];
            if(!file) return alert("请选择文件！");
            const reader = new FileReader();
            reader.readAsArrayBuffer(file);
            reader.onload = (e) => {
                const arr = new Uint8Array(e.target.result);
                let hash = "";
                for(let i=0;i<arr.length;i++){
                    hash += arr[i].toString(16).padStart(2,"0");
                }
                document.getElementById("fileHash").value = hash.slice(0,64);
            }
        }

        async function submitCert(){
            const hash = document.getElementById("fileHash").value;
            const meta = document.getElementById("metaInfo").value;
            if(!hash) return alert("请先生成哈希值！");
            
            const res = await httpPost("/api/chain/certify",{file_hash:hash,metadata:{remark:meta}});
            const dom = document.getElementById("certResult");
            if(res.code===200){
                dom.className="result alert-success";
                dom.innerText=`成功\n区块：${res.data.block_id}`;
                // 清空输入
                document.getElementById("certText").value = "";
                document.getElementById("certFile").value = "";
                document.getElementById("fileHash").value = "";
            }else{
                dom.className="result alert-danger";
                dom.innerText=res.msg;
            }
        }

        async function verifyHash(){
            const hash = document.getElementById("verifyHash").value;
            const res = await httpGet(`/api/chain/verify/${hash}`);
            const dom = document.getElementById("verifyResult");
            if(res.code===200){
                dom.className="result alert-success";
                dom.innerText=`验证通过\n时间：${res.data.created_at}`;
            }else{
                dom.className="result alert-danger";
                dom.innerText=res.msg;
            }
        }
    </script>
</body>
</html>
