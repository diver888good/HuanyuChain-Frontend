<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寰域链 V8.0 旗舰终版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html" class="active">首页存证</a>
                <a href="dashboard.html">管理面板</a>
                <!-- 🔥 新增：个人中心（统一导航） -->
                <a href="personal_center.html">个人中心</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button id="logoutBtn" class="btn-secondary">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card" id="loginCard">
            <div class="card-header"><h3>用户登录</h3></div>
            <div class="card-body">
                <input type="text" id="loginUser" placeholder="用户名">
                <input type="password" id="loginPwd" placeholder="密码">
                <button class="btn-primary" onclick="login()" id="loginBtn">登录</button>
            </div>
            <div class="link" style="text-align:center; padding:0 1rem 1rem; font-size:0.9rem;">
                没有账号？<a href="register.html" style="color:#2563eb;">立即注册</a>
            </div>
        </div>

        <div class="card" id="certCard" style="display:none;">
            <div class="card-header"><h3>文件哈希存证（自动计算SM3）</h3></div>
            <div class="card-body">
                <textarea id="certText" rows="4" placeholder="输入需要存证的文本内容（合同/声明/记录）"></textarea>
                <button class="btn-primary" onclick="getHashFromText()" id="textHashBtn">文本生成哈希</button>
                
                <input type="file" id="certFile">
                <button class="btn-primary" onclick="getHashFromFile()" id="fileHashBtn">文件生成哈希</button>

                <input type="text" id="fileHash" placeholder="自动生成的SM3哈希值" readonly>
                <textarea id="metaInfo" rows="3" placeholder="元数据"></textarea>
                <button class="btn-primary" onclick="submitCert()" id="submitBtn">提交存证</button>
                <div id="certResult" class="result"></div>
            </div>
        </div>

        <div class="card" id="verifyCard" style="display:none;">
            <div class="card-header"><h3>存证验证</h3></div>
            <div class="card-body">
                <input type="text" id="verifyHash" placeholder="哈希查询">
                <button class="btn-primary" onclick="verifyHash()" id="verifyBtn">验证</button>
                <div id="verifyResult" class="result"></div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem("token");
            const username = localStorage.getItem("username");
            if (token && username) {
                document.getElementById("loginCard").style.display = "none";
                document.getElementById("certCard").style.display = "block";
                document.getElementById("verifyCard").style.display = "block";
                initUserInfo();
            }
        });

        // 登录功能（原样保留）
        async function login() {
            const btn = document.getElementById("loginBtn");
            const user = document.getElementById("loginUser").value.trim();
            const pwd = document.getElementById("loginPwd").value.trim();

            if (!user || !pwd) {
                alert("请输入用户名和密码！");
                return;
            }

            btn.disabled = true;
            btn.innerText = "登录中...";

            try {
                const res = await httpPost("/api/auth/login", { username: user, password: pwd });
                if (res.code === 200) {
                    localStorage.setItem("token", res.data.token);
                    localStorage.setItem("username", res.data.username);
                    location.reload();
                } else {
                    alert(res.msg || "登录失败");
                }
            } catch (error) {
                alert("网络异常，请重试");
            } finally {
                btn.disabled = false;
                btn.innerText = "登录";
            }
        }

        // 文本生成哈希（原样保留）
        function getHashFromText() {
            const btn = document.getElementById("textHashBtn");
            const text = document.getElementById("certText").value.trim();
            
            if (!text) {
                alert("请输入存证文本！");
                return;
            }

            btn.disabled = true;
            let hash = "";
            for (let i = 0; i < text.length; i++) {
                hash += text.charCodeAt(i).toString(16).padStart(2, "0");
            }
            document.getElementById("fileHash").value = hash.slice(0, 64);
            btn.disabled = false;
        }

        // 文件生成哈希（原样保留）
        function getHashFromFile() {
            const btn = document.getElementById("fileHashBtn");
            const file = document.getElementById("certFile").files[0];
            
            if (!file) {
                alert("请选择文件！");
                return;
            }

            btn.disabled = true;
            const reader = new FileReader();
            reader.readAsArrayBuffer(file);
            reader.onload = (e) => {
                const arr = new Uint8Array(e.target.result);
                let hash = "";
                for (let i = 0; i < arr.length; i++) {
                    hash += arr[i].toString(16).padStart(2, "0");
                }
                document.getElementById("fileHash").value = hash.slice(0, 64);
                btn.disabled = false;
            };
        }

        // 提交存证 + 同步记录到个人中心（核心修改）
        async function submitCert() {
            const btn = document.getElementById("submitBtn");
            const hash = document.getElementById("fileHash").value.trim();
            const meta = document.getElementById("metaInfo").value.trim();

            if (!hash) {
                alert("请先生成哈希值！");
                return;
            }

            btn.disabled = true;
            btn.innerText = "提交中...";

            try {
                const res = await httpPost("/api/chain/certify", {
                    file_hash: hash,
                    metadata: { remark: meta }
                });
                const dom = document.getElementById("certResult");
                
                if (res.code === 200) {
                    // 🔥 新增：文件存证记录保存到个人中心
                    const certRecords = JSON.parse(localStorage.getItem("MY_CERTS") || "[]");
                    certRecords.unshift({
                        type: "文件/文本存证",
                        hash: hash,
                        block_id: res.data.block_id,
                        time: new Date().toLocaleString()
                    });
                    localStorage.setItem("MY_CERTS", JSON.stringify(certRecords));

                    dom.className = "result alert-success";
                    dom.innerText = `✅ 存证成功！\n区块：${res.data.block_id}\n记录已保存至【个人中心】`;
                    
                    // 清空表单
                    document.getElementById("certText").value = "";
                    document.getElementById("certFile").value = "";
                    document.getElementById("fileHash").value = "";
                    document.getElementById("metaInfo").value = "";
                } else {
                    dom.className = "result alert-danger";
                    dom.innerText = res.msg || "存证失败";
                }
            } catch (error) {
                document.getElementById("certResult").className = "result alert-danger";
                document.getElementById("certResult").innerText = "网络异常，请重试";
            } finally {
                btn.disabled = false;
                btn.innerText = "提交存证";
            }
        }

        // 验证功能（原样保留）
        async function verifyHash() {
            const btn = document.getElementById("verifyBtn");
            const hash = document.getElementById("verifyHash").value.trim();

            if (!hash) {
                alert("请输入哈希值！");
                return;
            }

            btn.disabled = true;
            btn.innerText = "验证中...";

            try {
                const res = await httpGet(`/api/chain/verify/${hash}`);
                const dom = document.getElementById("verifyResult");
                if (res.code === 200) {
                    dom.className = "result alert-success";
                    dom.innerText = `✅ 验证通过\n时间：${res.data.created_at}`;
                } else {
                    dom.className = "result alert-danger";
                    dom.innerText = res.msg || "验证失败";
                }
            } catch (error) {
                document.getElementById("verifyResult").className = "result alert-danger";
                document.getElementById("verifyResult").innerText = "网络异常，请重试";
            } finally {
                btn.disabled = false;
                btn.innerText = "验证";
            }
        }

        // 初始化用户信息（原样保留）
        function initUserInfo() {
            const username = localStorage.getItem("username");
            if (username) {
                document.getElementById("userInfo").style.display = "block";
                document.getElementById("username").innerText = username;
            }
        }
    </script>
</body>
</html>
