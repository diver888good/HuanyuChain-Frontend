<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政务中台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页</a>
                <a href="gov_dashboard.html" class="active">政务中台</a>
            </nav>
            <div id="userInfo" style="display:none">
                <span id="username"></span>
                <button onclick="logout()">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>政务可信存证中台</h3></div>
            <div class="card-body" id="govDataBox">加载中...</div>
        </div>
    </main>
<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded',async function(){
    if(!await verifyToken()){location.href="index.html";return;}
    showUserInfo();
    loadGovData();
})

async function loadGovData(){
    let res = await httpGet("/api/gov/data");
    govDataBox.innerText = res.msg||"政务数据加载完成";
}

function showUserInfo(){
    let u=JSON.parse(localStorage.getItem("userInfo")||"{}");
    username.innerText=u.username;userInfo.style.display="block";
}
</script>
</body>
</html>
