<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统控制台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- 顶部导航 -->
<div class="top-nav">
    <div class="logo">寰域链 V8.0 管理后台</div>
    <div class="user-info">
        <span id="userName">管理员</span>
        <span class="logout-btn" onclick="userLogout()">退出登录</span>
    </div>
</div>
<!-- 侧边栏 -->
<div class="side-bar">
    <a href="dashboard.html" class="active">系统首页</a>
    <a href="realname.html">实名身份备案</a>
    <a href="cert.html">链上数据存证</a>
    <a href="did.html">DID身份管理</a>
    <a href="video.html">视频司法存证</a>
    <a href="gov.html">政务台账上链</a>
    <a href="meta.html">元宇宙&NFT</a>
    <a href="privacy.html">隐私计算服务</a>
    <a href="judicial.html">司法存证报告</a>
    <a href="audit.html">系统审计日志</a>
    <a href="cross.html">跨链互通服务</a>
    <a href="contract.html">智能合约管理</a>
    <a href="iot.html">IoT设备存证</a>
    <a href="market.html">数字资产市场</a>
    <a href="ai.html">AI智能对话</a>
</div>
<!-- 主内容 -->
<div class="main-content">
    <!-- 新增：个人身份信息卡片（核心优化） -->
    <div class="card">
        <h2>我的链上身份</h2>
        <p>
            专属DID：<span id="showUserDID" style="color:#165DFF; font-weight:bold;"></span>
            <button class="btn" style="margin-left:10px;" onclick="copyText(getUserDID())">一键复制</button>
        </p>
        <p id="realStatus" style="margin-top:8px;">实名状态：未备案</p>
    </div>

    <div class="card">
        <h2>系统运行数据统计</h2>
        <div class="flex-row" id="statBox">
            <div class="stat-item">链高度：<span id="chainH">0</span></div>
            <div class="stat-item">总存证数：<span id="certNum">0</span></div>
            <div class="stat-item">注册用户数：<span id="userNum">0</span></div>
        </div>
    </div>
    <div class="card">
        <h3>系统状态</h3>
        <p>✅ 后端服务正常运行</p>
        <p>✅ 数据库连接正常</p>
        <p>✅ 国密算法套件已启用</p>
        <p>✅ 全模块功能已部署完成</p>
    </div>
</div>
<script src="app.js"></script>
<script>
window.onload=async function(){
    fillUserInfo();
    
    // 显示用户DID（核心优化）
    const myDid = getUserDID();
    document.getElementById("showUserDID").innerText = myDid || "未生成DID，请前往DID管理页面";

    // 加载系统统计数据
    let res = await httpGet("/api/monitor/stats");
    if(res.code===200){
        document.getElementById("chainH").innerText=res.data.chain_height;
        document.getElementById("certNum").innerText=res.data.total_cert;
        document.getElementById("userNum").innerText=res.data.total_user;
    }
}
</script>
</body>
</html>
