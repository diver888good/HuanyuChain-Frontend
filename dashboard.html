<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理面板</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页</a>
                <a href="dashboard.html" class="active">管理面板</a>
                <a href="personal_center.html">个人中心</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙资产</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display:none">
                <span id="username"></span>
                <button class="btn-secondary" onclick="logout()">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>系统数据统计</h3></div>
            <div class="card-body" id="statBox">加载中...</div>
        </div>
    </main>
<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded',async function(){
    let loginOk = await verifyToken();
    if(!loginOk){location.href="index.html";return;}
    showUserInfo();
    loadSystemStat();
})

async function loadSystemStat(){
    let res = await httpGet("/api/monitor/stats");
    if(res.code===200){
        let d = res.data;
        statBox.innerHTML = `
        <p>总用户数：${d.total_user}</p>
        <p>总存证数量：${d.total_cert}</p>
        <p>区块高度：${d.chain_height}</p>
        `;
    }else{
        statBox.innerText = "数据加载失败";
    }
}

function showUserInfo(){
    let u = JSON.parse(localStorage.getItem("userInfo")||"{}");
    username.innerText = u.username;
    userInfo.style.display="block";
}
</script>
</body>
</html>
