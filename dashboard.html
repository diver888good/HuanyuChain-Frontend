<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理面板 - 寰域链 V8.0</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .stats-item { margin: 10px 0; font-size: 16px; }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="personal_center.html">个人中心</a>
                <a href="dashboard.html" class="active">管理面板</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button id="logoutBtn" class="btn-secondary" onclick="logout()">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>系统统计</h3></div>
            <div class="card-body" id="statsBox">
                <div class="stats-item">📦 区块高度：0（本地模式）</div>
                <div class="stats-item">📄 总存证数：<span id="totalCert">0</span></div>
                <div class="stats-item">👤 总用户数：1（本地用户）</div>
                <div class="stats-item">🆔 DID身份：<span id="hasDID">未生成</span></div>
            </div>
        </div>
    </main>

    <!-- 纯本地代码，无任何外部依赖，零报错 -->
    <script>
        // 页面加载完成执行
        window.onload = function() {
            // 1. 本地校验登录（无接口、无跳转死循环）
            const token = localStorage.getItem("token");
            if (!token) {
                alert("请先登录！");
                location.href = "index.html";
                return;
            }

            // 2. 显示用户信息
            const userInfo = JSON.parse(localStorage.getItem("userInfo") || '{}');
            document.getElementById("username").innerText = userInfo.username || "本地用户";
            document.getElementById("userInfo").style.display = "block";

            // 3. 加载本地统计数据
            loadLocalStats();
        };

        // 读取本地存储统计数据
        function loadLocalStats() {
            // 存证总数
            const certList = JSON.parse(localStorage.getItem("MY_CERTS") || "[]");
            document.getElementById("totalCert").innerText = certList.length;

            // DID状态
            const didInfo = localStorage.getItem("MY_DID_INFO");
            document.getElementById("hasDID").innerText = didInfo ? "已生成" : "未生成";
        }

        // 退出登录
        function logout() {
            localStorage.clear();
            location.href = "index.html";
        }
    </script>
</body>
</html>
