<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理面板 - 寰域链 V8.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="personal_center.html">个人中心</a>
                <a href="dashboard.html" class="active">管理面板</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button id="logoutBtn" class="btn-secondary" onclick="logout()">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>系统统计</h3></div>
            <div class="card-body" id="statsBox">加载中...</div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const isLogin = await verifyToken();
            if (isLogin) {
                loadStats();
                showUserInfo();
            }else{
                location.href="index.html";
            }
        });

        async function loadStats() {
            try {
                const data = await httpGet("/api/monitor/stats");
                const statsBox = document.getElementById("statsBox");
                if (data.code === 200) {
                    const d = data.data;
                    statsBox.innerHTML = `
                        <p>📦 区块高度：${d.chain_height || 0}</p>
                        <p>📄 总存证数：${d.total_cert || 0}</p>
                        <p>👤 总用户数：${d.total_user || 0}</p>
                    `;
                } else {
                    statsBox.innerHTML = `<p style="color:red;">${data.msg || '数据加载失败'}</p>`;
                }
            } catch (error) {
                document.getElementById("statsBox").innerHTML = `<p style="color:red;">网络异常，获取统计数据失败</p>`;
                console.error(error);
            }
        }

        // 补齐缺失函数
        function showUserInfo(){
            let u = JSON.parse(localStorage.getItem("userInfo")||"{}");
            document.getElementById("username").innerText = u.username||"";
            document.getElementById("userInfo").style.display = "block";
        }
    </script>
</body>
</html>
