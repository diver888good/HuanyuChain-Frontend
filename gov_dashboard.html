<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政务中台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="dashboard.html">管理面板</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html" class="active">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;"><span id="username"></span><button id="logoutBtn" class="btn-secondary">退出</button></div>
        </div>
    </header>
    <main class="container">
        <div class="card"><div class="card-header"><h3>项目立项</h3></div><div class="card-body"><input id="projName" placeholder="项目名"><input id="projType" placeholder="类型"><input id="projBudget" placeholder="预算"><input id="deptDid" placeholder="部门DID"><button class="btn-primary" onclick="createGovProject()">立项</button><div id="projResult" class="result"></div></div></div>
        <div class="card" style="margin-top:2rem;"><div class="card-header"><h3>工资存证</h3></div><div class="card-body"><input id="workerName" placeholder="姓名"><input id="wageMonth" placeholder="月份"><input id="wageAmount" placeholder="金额"><button class="btn-primary" onclick="saveWage()">存证</button><div id="wageResult" class="result"></div></div></div>
    </main>
    <script src="app.js"></script>
    <script>
        window.onload = async ()=>{await verifyToken();}
        async function createGovProject(){
            const name = document.getElementById("projName").value;
            const type = document.getElementById("projType").value;
            const budget = parseFloat(document.getElementById("projBudget").value);
            const did = document.getElementById("deptDid").value;
            const data = await httpPost("/api/gov/project/create",{project_name:name,project_type:type,budget,dept_did:did});
            const dom = document.getElementById("projResult");
            data.code===200 ? (dom.className="result alert-success",dom.innerText=JSON.stringify(data.data,null,2)) : (dom.className="result alert-danger",dom.innerText=data.msg);
        }
        async function saveWage(){
            const name = document.getElementById("workerName").value;
            const month = document.getElementById("wageMonth").value;
            const amount = parseFloat(document.getElementById("wageAmount").value);
            const data = await httpPost("/api/gov/labor/wage",{worker_name:name,month,amount,enterprise_did:""});
            const dom = document.getElementById("wageResult");
            data.code===200 ? (dom.className="result alert-success",dom.innerText=JSON.stringify(data.data,null,2)) : (dom.className="result alert-danger",dom.innerText=data.msg);
        }
    </script>
</body>
</html>
