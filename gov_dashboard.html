<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政务中台 - 寰域链 V8.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="dashboard.html">管理面板</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html" class="active">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button id="logoutBtn" class="btn-secondary">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <!-- 项目立项 -->
        <div class="card">
            <div class="card-header"><h3>项目立项</h3></div>
            <div class="card-body">
                <input id="projName" placeholder="项目名">
                <input id="projType" placeholder="类型">
                <input id="projBudget" placeholder="预算（数字）">
                <input id="deptDid" placeholder="部门DID">
                <button class="btn-primary" onclick="createGovProject()" id="projBtn">立项</button>
                <div id="projResult" class="result"></div>
            </div>
        </div>

        <!-- 工资存证 -->
        <div class="card" style="margin-top:2rem;">
            <div class="card-header"><h3>工资存证</h3></div>
            <div class="card-body">
                <input id="workerName" placeholder="姓名">
                <input id="wageMonth" placeholder="月份（如：2025-12）">
                <input id="wageAmount" placeholder="金额（数字）">
                <button class="btn-primary" onclick="saveWage()" id="wageBtn">存证</button>
                <div id="wageResult" class="result"></div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        // 兼容新版 app.js 标准初始化
        document.addEventListener('DOMContentLoaded', async () => {
            await verifyToken();
        });

        // 项目立项（修复：输入校验+防重复+异常捕获）
        async function createGovProject() {
            const btn = document.getElementById("projBtn");
            const dom = document.getElementById("projResult");
            
            // 获取值
            const name = document.getElementById("projName").value.trim();
            const type = document.getElementById("projType").value.trim();
            const budget = parseFloat(document.getElementById("projBudget").value);
            const did = document.getElementById("deptDid").value.trim();

            // 输入校验
            if (!name || !type || isNaN(budget) || budget <= 0 || !did) {
                dom.className = "result alert-danger";
                dom.innerText = "请填写完整且有效的信息！";
                return;
            }

            // 防重复点击
            btn.disabled = true;
            btn.innerText = "立项中...";
            dom.innerText = "";

            try {
                const data = await httpPost("/api/gov/project/create", {
                    project_name: name,
                    project_type: type,
                    budget: budget,
                    dept_did: did
                });
                if (data.code === 200) {
                    dom.className = "result alert-success";
                    dom.innerText = "✅ 立项成功：\n" + JSON.stringify(data.data, null, 2);
                } else {
                    dom.className = "result alert-danger";
                    dom.innerText = data.msg || "立项失败";
                }
            } catch (error) {
                dom.className = "result alert-danger";
                dom.innerText = "网络异常，请重试";
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerText = "立项";
            }
        }

        // 工资存证（修复：输入校验+补全参数+防重复+异常捕获）
        async function saveWage() {
            const btn = document.getElementById("wageBtn");
            const dom = document.getElementById("wageResult");
            
            // 获取值
            const name = document.getElementById("workerName").value.trim();
            const month = document.getElementById("wageMonth").value.trim();
            const amount = parseFloat(document.getElementById("wageAmount").value);
            // 补全缺失的 enterprise_did 参数
            const enterprise_did = localStorage.getItem("username") || "default_gov";

            // 输入校验
            if (!name || !month || isNaN(amount) || amount <= 0) {
                dom.className = "result alert-danger";
                dom.innerText = "请填写完整且有效的信息！";
                return;
            }

            // 防重复点击
            btn.disabled = true;
            btn.innerText = "存证中...";
            dom.innerText = "";

            try {
                const data = await httpPost("/api/gov/labor/wage", {
                    worker_name: name,
                    month: month,
                    amount: amount,
                    enterprise_did: enterprise_did
                });
                if (data.code === 200) {
                    dom.className = "result alert-success";
                    dom.innerText = "✅ 工资存证成功：\n" + JSON.stringify(data.data, null, 2);
                } else {
                    dom.className = "result alert-danger";
                    dom.innerText = data.msg || "存证失败";
                }
            } catch (error) {
                dom.className = "result alert-danger";
                dom.innerText = "网络异常，请重试";
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerText = "存证";
            }
        }
    </script>
</body>
</html>
