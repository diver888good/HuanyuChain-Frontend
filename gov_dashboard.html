<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政务中台 - 寰域链 V8.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="personal_center.html">个人中心</a>
                <a href="dashboard.html">管理面板</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html" class="active">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button class="btn-secondary" onclick="logout()">退出</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <div class="card-header"><h3>政务中台管理</h3></div>
            <div class="card-body">
                <p>本地模式运行中</p>
                <p>存证总数：<span id="total">0</span></p>
            </div>
        </div>
    </main>

    <!-- 纯本地代码，无app.js，无任何外部函数 -->
    <script>
        // 唯一加载逻辑，无Promise、无verifyToken、无showUserInfo
        window.onload = function() {
            // 本地登录判断
            const token = localStorage.getItem("token");
            if (!token) {
                alert("请先登录！");
                location.href = "index.html";
                return;
            }

            // 直接渲染用户名，不调用任何外部函数
            const user = JSON.parse(localStorage.getItem("userInfo") || '{}');
            document.getElementById("username").innerText = user.username || "本地用户";
            document.getElementById("userInfo").style.display = "block";

            // 加载本地数据
            const certs = JSON.parse(localStorage.getItem("MY_CERTS") || "[]");
            document.getElementById("total").innerText = certs.length;
        };

        // 退出登录
        function logout() {
            localStorage.clear();
            location.href = "index.html";
        }
    </script>
</body>
</html>
