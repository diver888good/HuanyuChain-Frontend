<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元宇宙数字资产</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <nav>
                <a href="index.html">首页</a>
                <a href="metaverse_asset.html" class="active">元宇宙资产</a>
            </nav>
            <div id="userInfo" style="display:none">
                <span id="username"></span>
                <button onclick="logout()">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>3D资产/NFT存证</h3></div>
            <div class="card-body">
                <p>支持GLB/GLTF模型、数字藏品链上存证</p>
            </div>
        </div>
    </main>
<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded',async ()=>{
    if(!await verifyToken())location.href="index.html";
    showUserInfo();
})
function showUserInfo(){
    let u=JSON.parse(localStorage.getItem("userInfo")||"{}");
    username.innerText=u.username;userInfo.style.display="block";
}
</script>
</body>
</html>
