<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元宇宙NFT - 寰域链 V8.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="dashboard.html">管理面板</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html" class="active">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button id="logoutBtn" class="btn-secondary">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <!-- 资产确权 -->
        <div class="card">
            <div class="card-header"><h3>资产确权</h3></div>
            <div class="card-body">
                <input id="assetName" placeholder="资产名">
                <input id="assetDid" placeholder="DID">
                <textarea id="modelRaw" rows="3" placeholder="3D模型原始数据"></textarea>
                <button class="btn-primary" onclick="certMetaAsset()" id="assetBtn">确权</button>
                <div id="assetResult" class="result"></div>
            </div>
        </div>

        <!-- NFT铸造 -->
        <div class="card" style="margin-top:2rem;">
            <div class="card-header"><h3>NFT铸造</h3></div>
            <div class="card-body">
                <input id="nftAssetId" placeholder="资产ID">
                <input id="nftName" placeholder="NFT名">
                <input id="nftDid" placeholder="持有者DID">
                <button class="btn-primary" onclick="mintNFT()" id="nftBtn">铸造</button>
                <div id="nftResult" class="result"></div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        // 兼容新版 app.js 标准初始化
        document.addEventListener('DOMContentLoaded', async () => {
            await verifyToken();
        });

        // 资产确权（修复：输入校验+防重复+异常捕获）
        async function certMetaAsset() {
            const btn = document.getElementById("assetBtn");
            const dom = document.getElementById("assetResult");
            
            // 获取输入值
            const name = document.getElementById("assetName").value.trim();
            const did = document.getElementById("assetDid").value.trim();
            const raw = document.getElementById("modelRaw").value.trim();

            // 输入校验
            if (!name || !did || !raw) {
                dom.className = "result alert-danger";
                dom.innerText = "请填写完整信息！";
                return;
            }

            // 防重复点击
            btn.disabled = true;
            btn.innerText = "确权中...";
            dom.innerText = "";

            try {
                const data = await httpPost("/api/meta/asset/cert", {
                    asset_name: name,
                    did: did,
                    model_raw: raw,
                    asset_type: "3d_model"
                });
                if (data.code === 200) {
                    dom.className = "result alert-success";
                    dom.innerText = "✅ 资产确权成功：\n" + JSON.stringify(data.data, null, 2);
                } else {
                    dom.className = "result alert-danger";
                    dom.innerText = data.msg || "确权失败";
                }
            } catch (error) {
                dom.className = "result alert-danger";
                dom.innerText = "网络异常，请重试";
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerText = "确权";
            }
        }

        // NFT铸造（修复：输入校验+防重复+异常捕获）
        async function mintNFT() {
            const btn = document.getElementById("nftBtn");
            const dom = document.getElementById("nftResult");
            
            // 获取输入值
            const aid = document.getElementById("nftAssetId").value.trim();
            const name = document.getElementById("nftName").value.trim();
            const did = document.getElementById("nftDid").value.trim();

            // 输入校验
            if (!aid || !name || !did) {
                dom.className = "result alert-danger";
                dom.innerText = "请填写完整信息！";
                return;
            }

            // 防重复点击
            btn.disabled = true;
            btn.innerText = "铸造中...";
            dom.innerText = "";

            try {
                const data = await httpPost("/api/meta/nft/mint", {
                    asset_id: aid,
                    nft_name: name,
                    did: did
                });
                if (data.code === 200) {
                    dom.className = "result alert-success";
                    dom.innerText = "✅ NFT铸造成功：\n" + JSON.stringify(data.data, null, 2);
                } else {
                    dom.className = "result alert-danger";
                    dom.innerText = data.msg || "铸造失败";
                }
            } catch (error) {
                dom.className = "result alert-danger";
                dom.innerText = "网络异常，请重试";
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerText = "铸造";
            }
        }
    </script>
</body>
</html>
