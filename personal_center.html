<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 寰域链 V8.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="personal_center.html" class="active">个人中心</a>
                <a href="dashboard.html">管理面板</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button id="logoutBtn" class="btn-secondary" onclick="logout()">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>个人信息</h3></div>
            <div class="card-body">
                <p>用户名：<span id="myUserName"></span></p>
                <p>DID身份：<span id="myDidText">暂无</span></p>
            </div>
        </div>
        <div class="card" style="margin-top: 20px;">
            <div class="card-header"><h3>我的存证记录</h3></div>
            <div class="card-body" id="userCertList">加载中...</div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded',async ()=>{
            let loginFlag = await verifyToken();
            if(!loginFlag){
                location.href="index.html";
                return;
            }
            showUserInfo();
            loadUserInfoData();
            loadUserCertList();
        });

        async function loadUserInfoData(){
            let res = await httpGet("/api/user/info");
            if(res.code===200){
                myUserName.innerText = res.data.username;
                myDidText.innerText = res.data.user_did||"未生成";
            }
        }

        async function loadUserCertList(){
            let res = await httpGet("/api/cert/userlist");
            let box = userCertList;
            if(res.code!==200){
                box.innerText = "暂无存证数据";
                return;
            }
            let html = "";
            res.data.forEach(item=>{
                html += `<div style="padding:8px;border-bottom:1px solid #eee;">
                    哈希值：${item.hash_value}<br>提交时间：${item.create_time}
                </div>`;
            });
            box.innerHTML = html;
        }

        function showUserInfo(){
            let u = JSON.parse(localStorage.getItem("userInfo")||"{}");
            username.innerText = u.username||"";
            userInfo.style.display = "block";
        }
    </script>
</body>
</html>
