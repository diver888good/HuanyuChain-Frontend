<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页</a>
                <a href="personal_center.html" class="active">个人中心</a>
            </nav>
            <div id="userInfo" style="display:none">
                <span id="username"></span>
                <button onclick="logout()">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>个人资料</h3></div>
            <div class="card-body">
                <p>用户名：<span id="pUserName"></span></p>
                <p>绑定DID：<span id="pUserDid"></span></p>
            </div>
        </div>
        <div class="card" style="margin-top:20px">
            <div class="card-header"><h3>我的存证记录</h3></div>
            <div class="card-body" id="myCertList">加载中...</div>
        </div>
    </main>
<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded',async function(){
    if(!await verifyToken()){
        location.href="index.html";
        return;
    }
    showUserInfo();
    loadUserBaseInfo();
    loadUserCertList();
})

async function loadUserBaseInfo(){
    // 模拟用户信息（防止接口404）
    let user = JSON.parse(localStorage.getItem("userInfo") || "{}");
    pUserName.innerText = user.username || "测试用户";
    pUserDid.innerText = "did:huanyu:test123456";
}

async function loadUserCertList(){
    let res = await httpGet("/api/cert/userlist");
    if(res.code !== 200 || !res.data || res.data.length === 0){
        myCertList.innerText = "暂无存证记录";
        return;
    }
    let html = "";
    res.data.forEach(item=>{
        html+=`<div style="padding:8px;border-bottom:1px solid #eee;">
        哈希：${item.hash_value}<br>时间：${item.create_time || '无时间'}
        </div>`;
    })
    myCertList.innerHTML = html;
}

// ✅ 永不报错版用户信息显示
function showUserInfo(){
    try {
        let u = JSON.parse(localStorage.getItem("userInfo") || "{}");
        username.innerText = u.username || "";
        userInfo.style.display = "block";
    } catch(e) {}
}

// ✅ 退出登录
function logout(){
    localStorage.clear();
    location.href = "index.html";
}
</script>
</body>
</html>
