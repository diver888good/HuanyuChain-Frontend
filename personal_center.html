<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 寰域链 V8.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="personal_center.html" class="active">个人中心</a>
                <a href="dashboard.html">管理面板</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button class="btn-secondary" onclick="logout()">退出</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <div class="card-header"><h3>个人信息</h3></div>
            <div class="card-body">
                <p>用户名：<span id="userName"></span></p>
                <p>DID身份：<span id="userDID">未生成</span></p>
            </div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <div class="card-header"><h3>我的存证记录</h3></div>
            <div class="card-body" id="certList">
                暂无存证记录
            </div>
        </div>
    </main>

    <script>
        // 纯本地加载，无异步、无app.js、无任何外部函数
        window.onload = function() {
            // 登录校验
            const token = localStorage.getItem("token");
            if (!token) {
                alert("请先登录！");
                location.href = "index.html";
                return;
            }

            // 渲染用户信息（替代showUserInfo）
            const user = JSON.parse(localStorage.getItem("userInfo") || '{}');
            document.getElementById("userName").innerText = user.username || "本地用户";
            document.getElementById("username").innerText = user.username || "本地用户";
            document.getElementById("userInfo").style.display = "block";

            // 渲染DID
            const did = localStorage.getItem("MY_DID_INFO");
            if (did) document.getElementById("userDID").innerText = did;

            // 渲染存证记录
            loadCertList();
        };

        // 加载本地存证
        function loadCertList() {
            const list = JSON.parse(localStorage.getItem("MY_CERTS") || "[]");
            const box = document.getElementById("certList");
            if (list.length === 0) {
                box.innerHTML = "暂无存证记录";
                return;
            }
            let html = "";
            list.forEach(item => {
                html += `<div style="padding:8px; border-bottom:1px solid #eee;">
                    ${item.type} | ${item.time}<br>ID: ${item.hash}
                </div>`;
            });
            box.innerHTML = html;
        }

        // 退出登录
        function logout() {
            localStorage.clear();
            location.href = "index.html";
        }
    </script>
</body>
</html>
