<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>DID身份管理</title>
    <link rel="stylesheet" href="style.css">
    <!-- ✅ 管理员权限校验（后台页面必备） -->
    <script>
    if(!localStorage.userInfo){
        alert("请先登录！");
        location.href="login.html";
    }
    let user = JSON.parse(localStorage.userInfo);
    if(user.user_role !== "admin"){
        alert("无后台管理权限！");
        location.href="user_center.html";
    }
    </script>
</head>
<body>
<div class="top-nav">
    <div class="logo">寰域链 V8.0 管理后台</div>
    <div class="user-info">
        <span id="userName">管理员</span>
        <span class="logout-btn" onclick="userLogout()">退出登录</span>
    </div>
</div>
<div class="side-bar">
    <!-- ✅ 全部修改为 admin_ 前缀链接 -->
    <a href="admin_dashboard.html">系统首页</a>
    <a href="admin_realname.html">实名身份备案</a>
    <a href="admin_cert.html">链上数据存证</a>
    <a href="admin_did.html" class="active">DID身份管理</a>
    <a href="admin_video.html">视频司法存证</a>
    <a href="admin_gov.html">政务台账上链</a>
    <a href="admin_meta.html">元宇宙&NFT</a>
    <a href="admin_privacy.html">隐私计算服务</a>
    <a href="admin_judicial.html">司法存证报告</a>
    <a href="admin_audit.html">系统审计日志</a>
    <a href="admin_cross.html">跨链互通服务</a>
    <a href="admin_contract.html">智能合约管理</a>
    <a href="admin_iot.html">IoT设备存证</a>
    <a href="admin_market.html">数字资产市场</a>
    <a href="admin_ai.html">AI智能对话</a>
</div>
<div class="main-content">
    <!-- 实时显示当前DID + 一键复制 -->
    <div class="card">
        <h2>我的当前DID</h2>
        <p id="currentDID" style="color:#165DFF; font-weight:bold; font-size:16px;">暂未生成DID</p>
        <button class="btn" onclick="copyText()">一键复制DID</button>
    </div>

    <div class="card">
        <h2>生成用户主DID</h2>
        <button class="btn" onclick="createUserDID()">生成/刷新专属DID</button>
    </div>

    <div class="card">
        <h2>国密SM2电子签名</h2>
        <input type="text" id="signDid" placeholder="填写你的DID（自动填充）">
        <textarea id="signContent" placeholder="待签名文本内容"></textarea>
        <button class="btn" onclick="doSm2Sign()">发起签名</button>
    </div>
</div>
<script src="app.js"></script>
<script>
fillUserInfo();

// 🔥 核心修复：补全所有缺失函数
// 1. 获取本地存储的DID
function getUserDID() {
    return localStorage.getItem("user_did") || "";
}

// 2. 保存DID到本地
function saveUserDID(did) {
    localStorage.setItem("user_did", did);
}

// 3. 自动填充DID到签名框
function autoFillUserDID() {
    let did = getUserDID();
    if(did) {
        document.getElementById("signDid").value = did;
    }
}

// 4. 一键复制DID
function copyText() {
    let did = getUserDID();
    if(!did) {
        alert("暂无DID可复制！");
        return;
    }
    navigator.clipboard.writeText(did).then(() => {
        alert("DID复制成功！");
    })
}

// 页面加载初始化
window.onload = function(){
    document.getElementById("currentDID").innerText = getUserDID() || "暂未生成DID";
    autoFillUserDID();
}

// 生成DID（自动保存）
async function createUserDID(){
    try {
        let uid = JSON.parse(localStorage.userInfo).user_id;
        let res = await httpPost('/api/did/generate',{user_id:uid});
        if(res.code === 200){
            saveUserDID(res.data.did);
            document.getElementById("currentDID").innerText = res.data.did;
            alert("DID生成成功！已自动保存\n" + res.data.did);
            autoFillUserDID();
        }else{
            alert(res.msg || "生成失败");
        }
    }catch(e){
        alert("生成DID异常，请重新登录");
        console.error(e);
    }
}

// SM2国密签名（修复404+错误捕获）
async function doSm2Sign(){
    try {
        let data = {
            did: document.getElementById('signDid').value,
            content: document.getElementById('signContent').value
        }
        let res = await httpPost('/api/did/service/sign',data);
        alert("国密SM2签名完成：\n" + JSON.stringify(res.data));
    } catch (error) {
        alert("⚠️ 签名服务异常");
        console.error(error);
    }
}
</script>
</body>
</html>
