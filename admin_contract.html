<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <!-- ✅ 管理员权限校验（后台页面必备） -->
    <script>
    if(!localStorage.userInfo){
        alert("请先登录！");
        location.href="login.html";
    }
    let user = JSON.parse(localStorage.userInfo);
    if(user.user_role !== "admin"){
        alert("无后台管理权限！");
        location.href="user_center.html";
    }
    </script>
</head>
<body>
<div class="top-nav">
    <div class="logo">寰域链 V8.0 管理后台</div>
    <div class="user-info">
        <span id="userName">管理员</span>
        <span class="logout-btn" onclick="userLogout()">退出登录</span>
    </div>
</div>
<div class="side-bar">
    <!-- ✅ 全部修改为 admin_ 前缀链接 -->
    <a href="admin_dashboard.html">系统首页</a>
    <a href="admin_realname.html">实名身份备案</a>

    <a href="admin_ai.html">AI智能对话</a>
</div>
<div class="main-content">
    <div class="card">
        <h2>已部署智能合约列表</h2>
        <button class="btn" onclick="loadContractList()">刷新合约列表</button>
        <div id="contractBox" style="margin-top:20px;"></div>
    </div>
</div>
<script src="app.js"></script>
<script>
fillUserInfo();
// 🔥 原有代码100%保留，无任何修改
async function loadContractList(){
    try {
        let res = await httpGet('/api/contract/list');
        let html = '';
        if(res.code === 200 && res.data) {
            res.data.forEach(item=>{
                html += `<p>合约ID:${item.id}  名称:${item.name}  创建者:${item.creator}  时间:${item.create_time}</p>`
            })
        }
        document.getElementById('contractBox').innerHTML = html;
    } catch (error) {
        alert("⚠️ 加载智能合约列表失败");
        console.error(error);
    }
}
</script>
</body>
</html>
