<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DID管理中心</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <nav>
                <a href="index.html">首页</a>
                <a href="did_identity.html">DID身份</a>
                <a href="did_center.html" class="active">DID管理中心</a>
            </nav>
            <div id="userInfo" style="display:none">
                <span id="username"></span>
                <button onclick="logout()">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>全域DID身份管理</h3></div>
            <div class="card-body">
                <p>统一管理用户去中心化身份标识</p>
            </div>
        </div>
    </main>
<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded',async ()=>{
    if(!await verifyToken()){location.href="index.html";return;}
    showUserInfo();
})

// 🔥 修复：永不报错的用户信息显示
function showUserInfo(){
    try {
        let u = JSON.parse(localStorage.getItem("userInfo") || "{}");
        if(document.getElementById("username")){
            document.getElementById("username").innerText = u.username || "";
        }
        if(document.getElementById("userInfo")){
            document.getElementById("userInfo").style.display = "block";
        }
    } catch(e) {}
}

// 🔥 修复：退出登录函数（防止报错）
function logout(){
    localStorage.clear();
    location.href = "index.html";
}
</script>
</body>
</html>
