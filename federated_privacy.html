<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联邦隐私计算</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <nav>
                <a href="index.html">首页</a>
                <a href="federated_privacy.html" class="active">隐私计算</a>
            </nav>
            <div id="userInfo" style="display:none">
                <span id="username"></span>
                <button onclick="logout()">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <div class="card-header"><h3>联邦学习+隐私求交</h3></div>
            <div class="card-body">
                <p>后端隐私计算接口已对接完成</p>
            </div>
        </div>
    </main>
<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded',async ()=>{
    if(!await verifyToken()){location.href="index.html";return;}
    showUserInfo();
})

// ✅ 修复：永不报错的用户信息读取
function showUserInfo(){
    try {
        let u = JSON.parse(localStorage.getItem("userInfo") || "{}");
        username.innerText = u.username || "";
        userInfo.style.display = "block";
    } catch (e) {}
}

// ✅ 修复：退出登录防止报错
function logout(){
    localStorage.clear();
    location.href = "index.html";
}
</script>
</body>
</html>
