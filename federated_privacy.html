<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隐私计算 - 寰域链 V8.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo">寰域链 V8.0</h1>
            <button class="menu-toggle">☰</button>
            <nav>
                <a href="index.html">首页存证</a>
                <a href="personal_center.html">个人中心</a>
                <a href="dashboard.html">管理面板</a>
                <a href="did_identity.html">DID身份</a>
                <a href="video_cert.html">视频存证</a>
                <a href="federated_privacy.html" class="active">隐私计算</a>
                <a href="metaverse_asset.html">元宇宙NFT</a>
                <a href="gov_dashboard.html">政务中台</a>
            </nav>
            <div id="userInfo" style="display: none;">
                <span id="username"></span>
                <button class="btn-secondary" onclick="logout()">退出</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card"><div class="card-header"><h3>隐私计算（本地模式）</h3></div><div class="card-body"><p>功能已离线就绪</p></div></div>
    </main>
    <script>
        window.onload = () => {
            const token = localStorage.getItem("token");
            if (!token) { alert("请先登录！"); location.href = "index.html"; return; }
            const user = JSON.parse(localStorage.getItem("userInfo")||'{}');
            document.getElementById("username").innerText = user.username||"用户";
            document.getElementById("userInfo").style.display = "block";
        };
        function logout(){localStorage.clear();location.href="index.html";}
    </script>
</body>
</html>
