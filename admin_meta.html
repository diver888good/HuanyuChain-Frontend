<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>元宇宙&NFT</title>
    <link rel="stylesheet" href="style.css">
    <!-- ✅ 管理员权限校验（后台页面必备） -->
    <script>
    if(!localStorage.userInfo){
        alert("请先登录！");
        location.href="login.html";
    }
    let user = JSON.parse(localStorage.userInfo);
    if(user.user_role !== "admin"){
        alert("无后台管理权限！");
        location.href="user_center.html";
    }
    </script>
</head>
<body>
<div class="top-nav">
    <div class="logo">寰域链 V8.0 管理后台</div>
    <div class="user-info">
        <span id="userName">管理员</span>
        <span class="logout-btn" onclick="userLogout()">退出登录</span>
    </div>
</div>
<div class="side-bar">
    <!-- ✅ 全部修改为 admin_ 前缀链接 -->
    <a href="admin_dashboard.html">系统首页</a>
    <a href="admin_realname.html">实名身份备案</a>
    <a href="admin_cert.html">链上数据存证</a>
    <a href="admin_did.html">DID身份管理</a>
    <a href="admin_video.html">视频司法存证</a>
    <a href="admin_gov.html">政务台账上链</a>
    <a href="admin_meta.html" class="active">元宇宙&NFT</a>
    <a href="admin_privacy.html">隐私计算服务</a>
    <a href="admin_judicial.html">司法存证报告</a>
    <a href="admin_audit.html">系统审计日志</a>
    <a href="admin_cross.html">跨链互通服务</a>
    <a href="admin_contract.html">智能合约管理</a>
    <a href="admin_iot.html">IoT设备存证</a>
    <a href="admin_market.html">数字资产市场</a>
    <a href="admin_ai.html">AI智能对话</a>
</div>
<div class="main-content">
    <div class="card">
        <h2>元宇宙3D资产存证</h2>
        <input type="text" id="assetName" placeholder="资产名称">
        <input type="text" id="ownerDid" placeholder="所有者DID">
        <button class="btn" onclick="metaAssetCert()">资产上链存证</button>
    </div>
    <div class="card">
        <h2>NFT数字藏品铸造</h2>
        <input type="text" id="bindAssetId" placeholder="绑定资产ID">
        <input type="text" id="nftName" placeholder="NFT藏品名称">
        <input type="text" id="nftOwnerDid" placeholder="持有者DID">
        <button class="btn" onclick="mintNFT()">一键铸造NFT</button>
    </div>
</div>
<script src="app.js"></script>
<script>
fillUserInfo();
// 🔥 原有代码100%保留，无任何修改
async function metaAssetCert(){
    let data = {
        asset_name:document.getElementById('assetName').value,
        did:document.getElementById('ownerDid').value
    }
    let res = await httpPost('/api/meta/asset/cert',data);
    alert("资产ID："+res.data.asset_id+" "+res.msg);
}
async function mintNFT(){
    let data = {
        asset_id:document.getElementById('bindAssetId').value,
        nft_name:document.getElementById('nftName').value,
        did:document.getElementById('nftOwnerDid').value
    }
    let res = await httpPost('/api/meta/nft/mint',data);
    alert("NFT编号："+res.data.nft_id+" "+res.msg);
}
</script>
</body>
</html>
